<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotlight Validator — API Governance Playground</title>
    <meta name="description" content="Lint OpenAPI, AsyncAPI, and JSON Schema in the browser with Spotlight rules. Pick a rule category, or click a result to edit the rule." />
    <link rel="icon" href="/spotlight-rules-logo.png" type="image/png" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <img src="/spotlight-rules-logo.png" alt="Spotlight Rules" width="26" height="26" />
        <strong>Spotlight Validator</strong>
        <span class="tag">governance playground</span>
      </div>
      <nav>
        <a href="https://github.com/api-commons/spotlight-validator/blob/main/THIRD_PARTY_NOTICES.md" target="_blank" rel="noopener" title="Rule sources &amp; licenses">Credits</a>
        <a href="https://github.com/api-commons/spotlight-validator" target="_blank" rel="noopener">GitHub</a>
        <a href="https://spotlight-rules.com" target="_blank" rel="noopener">Spotlight Rules</a>
        <a href="https://apievangelist.com" target="_blank" rel="noopener" title="An API Evangelist project">API Evangelist</a>
      </nav>
    </header>

    <main class="layout">
      <section class="pane">
        <div class="artifact-toolbar">
          <select id="artifact-type" class="art-select" aria-label="Artifact type"></select>
          <div class="search-wrap">
            <input id="artifact-search" type="search" placeholder="Search APIs.io…" autocomplete="off" />
            <button id="artifact-search-btn" title="Search APIs.io">Search</button>
            <div id="search-results" class="search-results" hidden></div>
          </div>
          <div class="lang-toggle" role="group" aria-label="Editor format">
            <button id="lang-yaml" class="active" type="button">YAML</button>
            <button id="lang-json" type="button">JSON</button>
          </div>
        </div>
        <div id="doc-status" class="muted small doc-status"></div>
        <div id="doc-editor" class="editor"></div>
      </section>

      <section class="pane">
        <div class="pane-head">
          <span>Rules &amp; Results</span>
        </div>
        <div class="cat-bar">
          <label for="category">Rule category</label>
          <select id="category"><option value="">All categories</option></select>
        </div>
        <div class="rules-meta muted small">
          <span id="active-count">0</span> rules active ·
          <span id="result-count">—</span> ·
          <span class="hint-text">click a result to edit its rule</span>
        </div>
        <ul id="results"></ul>
      </section>
    </main>

    <div id="modal" class="modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <span id="modal-title">Edit rule</span>
          <button id="modal-close" aria-label="Close">&times;</button>
        </div>
        <p id="rule-note" class="muted small"></p>
        <div id="rule-editor" class="editor"></div>
        <div class="modal-actions">
          <button id="rule-apply" class="primary">Apply &amp; lint</button>
          <button id="rule-reset">Reset to default</button>
          <button id="rule-disable">Disable rule</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
