name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Ruleset construction gate
        run: npm run check:rulesets
      - name: Agent-skill catalog drift
        run: npm run check:skill-sync
      - run: npm run build
