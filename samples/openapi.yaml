openapi: "3.0.3"
info:
  title: Pet Store
  version: "1.0.0"
paths:
  /Pets:
    get:
      responses:
        "200":
          description: A list of pets.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
components:
  schemas:
    Pet:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
