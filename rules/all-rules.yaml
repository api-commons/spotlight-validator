    severity: info
    given: $.[patch][requestBody][content]
    then:
      field: application/json
      function: falsy
    formats:
      - oas3
    tags:
      - format:openapi
      - spec:operations
      - spec:request-body
      - spec:media-types
      - topic:content-negotiation
      - experience:consistency
      - experience:data-modeling
