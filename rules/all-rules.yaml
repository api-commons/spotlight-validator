# Spotlight Validator — EVERY rule the validator applies, grouped by artifact (format).
# EDIT freely (title, description, message, severity, given, then, tags), then hand this
# file back and I'll feed it into the build.
#
# SEVERITY POLICY: every rule ships at `severity: info`. The goal is to EDUCATE, not to
# block. Adopters raise individual rules to `warn` or `error` (per ruleset / per override)
# only for the conventions they choose to enforce.
#
# Each rule also carries a `title` (Title Case display name) and namespaced `tags`:
#   format:<artifact>  spec:<location>  topic:<feature>  experience:<dimension>  owasp:<apiN>
#
#   source: compiled  -> rules/spotlight-recommended.yaml (best-of-breed; fully editable)
#   source: default   -> rules/defaults/<artifact>.yaml   (per-artifact; fully editable)
#   source: builtin   -> upstream spotlight:oas/asyncapi/arazzo engine rules. Editable here
#                        as overrides (severity / disable / re-author); 'then.function' is a
#                        built-in function name. Swagger/OAS2 rules are excluded (validator
#                        turns them off).
#
# Totals: 733 rules across 12 artifacts.
#   by source: compiled:307, builtin:118, default:159, spotlight:149
#   by artifact: openapi:426, apis-json:106, asyncapi:75, arazzo:33, agent-skill:18, mcp:14, plans:13, json-structure:12, finops:11, rate-limits:10, jsonschema:9, json-ld:6

