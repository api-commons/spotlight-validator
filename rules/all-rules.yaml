    source: spotlight
    description: "If an Access-Control-Allow-Origin response header is documented, it should not hard-code a wildcard (*) — reflect specific allowed origins instead, especially for authenticated APIs (OWASP API8 security misconfiguration). Note: the project treats CORS as operational (see no-operational-headers-in-spec); this is a defensive check for specs that do document it."
