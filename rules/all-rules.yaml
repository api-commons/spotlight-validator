    severity: info
    given:
      - $.paths.*.get
    then:
      - field: security
        function: schema
        functionOptions:
          schema:
            items:
              type: object
              minProperties: 1
            minItems: 1
            type: array
    formats:
      - oas3
    tags:
      - owasp:api2
      - format:openapi
      - spec:paths
      - spec:operations
      - experience:security
    prompt: "You are editing an OpenAPI document to satisfy the Spotlight API governance rule 'operation-get-require-security' (Operation Get Require Security). Requirement: Your API should be protected by a `security` rule either at global or operation level. Operations should be protected specially when they are tied to non-idempotent HTTP methods like `POST`, `PUT`, `PATCH` and `DELETE`. This is done with one or more non-empty `security` rules. Security rules are defined in the `securityScheme` section. An example of a security rule applied at global level. ``` security: - BasicAuth: [] paths: /books: {} /users: {} securitySchemes: BasicAuth: scheme: http type: basic ``` An example of a security rule applied at operation level, which eventually overrides the global one ``` paths: /books: post: security: - AccessToken: [] securitySchemes: BasicAuth: scheme: http type: basic AccessToken: scheme: http type: bearer bearerFormat: JWT ```. To fix: Adjust `security` so it conforms to the schema this rule requires. Guidance: The following operation is not protected by a `security` rule. This rule is evaluated at the JSONPath `$.paths.*.get` — inspect every location it matches and correct only what violates the rule. Make the smallest change that satisfies the rule, leave all unrelated content, key order, comments, and formatting unchanged, and keep the document valid OpenAPI. Return only the complete corrected document, with no commentary."
