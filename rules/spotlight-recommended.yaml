          type: object
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-invalid-head-response-code:
    description: HEAD operations should not return 201, 202, 204, 409, 412 status codes
    severity: warn
    given: $.paths[*].head.responses
    then:
