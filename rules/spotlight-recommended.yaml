      - category:structure
  sps-commerce/sps-request-head-invalid-body:
    description: A `HEAD` request MUST NOT accept a request body
    severity: error
    given: $.paths[*][head].requestBody
    then:
      function: undefined
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-response-head-invalid-body:
    description: HEAD operations should not return a response body for success
    given: $.paths.*.head.responses[200].content
    severity: error
    then:
      function: falsy
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-invalid-options-response-code:
    description: OPTIONS operations should not return 201, 202, 409, 412 status codes
    severity: warn
    given: $.paths[*].options.responses
    then:
      field: "@key"
      function: pattern
      functionOptions:
        notMatch: ^(201|202|409|412)$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-request-options-invalid-body:
    description: An `OPTIONS` request MUST NOT accept a request body
    severity: error
    given: $.paths[*][options].requestBody
    then:
      function: undefined
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-response-options-invalid-body:
    description: OPTIONS operations should not return a response body for success
    given: $.paths.*.options.responses[200, 204].content
    severity: error
    then:
      function: falsy
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-request-support-json:
    description: Every request MUST support `application/json` media type
    formats:
      - oas3
    severity: error
    given: $.paths[*][*].requestBody.content
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          properties:
            application/json: true
          required:
            - application/json
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-no-numeric-ids:
    description: Avoid exposing IDs as an integer, UUIDs or other interoperable
      strings are preferred.
    severity: warn
    given: $.paths..parameters[*].[?(@property === "name" && (@ === "id" || @ ===
      "ID" || @ === "Id"))]^.schema
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          not:
            properties:
              type:
                const: integer
          properties:
            format:
              const: uuid
    tags:
      - source:sps-commerce
      - format:openapi
      - category:general
  sps-commerce/sps-semver:
    severity: warn
    message: Version should use semantic versioning. {{value}} is not a valid version.
    given: $.info.version
    then:
      function: pattern
      functionOptions:
        match: ^([0-9]+.[0-9]+.[0-9]+)$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:general
    description: sps-semver
  sps-commerce/sps-schema-names-pascal-case:
    severity: warn
    description: Schema names SHOULD be written in PascalCase
    message: "{{property}} is not PascalCase: {{error}}"
    recommended: true
    type: style
    given: $.components.schemas.*~
    then:
      function: pattern
      functionOptions:
        match: ^[A-Z][a-zA-Z0-9]*$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-response-names-pascal-case:
    severity: warn
    description: Response names SHOULD be written in PascalCase
    message: "{{property}} is not PascalCase: {{error}}"
    recommended: true
    type: style
    given: $.components.responses.*~
    then:
      function: pattern
      functionOptions:
        match: ^[A-Z][a-zA-Z0-9]*$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-limit-path-size:
    message: APIs SHOULD NOT expand their total URL length beyond a few hundred
      characters.
    severity: warn
    given: $.paths.*~
    then:
      function: length
      functionOptions:
        max: 100
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-limit-path-size
  sps-commerce/sps-hosts-https-only:
    message: Servers MUST be https and no other protocol is allowed unless using
      localhost.
    formats:
      - oas3
    severity: error
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        match: ^(https:|http://localhost)
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-hosts-https-only
  sps-commerce/sps-hosts-lowercase:
    message: Server URL SHOULD BE lowercase.
    formats:
      - oas3
    severity: warn
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        match: ^[^A-Z]*$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-hosts-lowercase
  sps-commerce/sps-hosts-spscommerce-domain:
    message: APIs SHOULD be accessible under api.spscommerce.com.
    formats:
      - oas3
    severity: warn
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        match: api.spscommerce.com|api.sps-internal.com|localhost
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-hosts-spscommerce-domain
  sps-commerce/sps-path-no-environment:
    message: API paths MUST NOT indicate environment names.
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: /prod/|/preprod/|/dev/|/test/|/integration/|/stage/
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-path-no-environment
  sps-commerce/sps-hosts-no-port:
    message: Port MUST NOT be specified or required to use the API, except for
      'localhost' testing in a spec.
    formats:
      - oas3
    severity: error
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        notMatch: (?!https?://localhost)(https?://.*):(\d*)\/?(.*)
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-hosts-no-port
  sps-commerce/sps-paths-expose-technology:
    message: A resource MUST NOT leak or expose format or technology-specific
      information at any point in the path.
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: (.php|.asp|.jsp|.cgi|.psp|.json|.xml)
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-expose-technology
  sps-commerce/sps-paths-expose-extension:
    message: A resource SHOULD NOT make use of an extension at any point in the path.
    severity: warn
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: \.
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-expose-extension
  sps-commerce/sps-paths-kebab-case:
    message: A resource containing multiple words MUST be separated using kebab-case
      (lower case and separated with hyphens).
    severity: error
    given: $.paths[?(/^((?!_webhooks).)*$/i.test(@property))]~
    then:
      function: pattern
      functionOptions:
        notMatch: (\/[a-z]+_.)|(\/([a-z]|[A-Z])+[A-Z])
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-kebab-case
  sps-commerce/sps-paths-trailing-slash:
    message: A resource MUST be addressable without a trailing slash on the path.
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: /$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-trailing-slash
  sps-commerce/sps-paths-with-api:
    message: A resource SHOULD NOT contain 'api' as a prefix in or a part of the path.
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: /api|/api/|-api/
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-with-api
  sps-commerce/sps-paths-empty-segments:
    message: A resource MUST use normalized paths without empty path segments.
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: //
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-empty-segments
  sps-commerce/sps-paths-limit-path-parameters:
    message: The URL path should not contain more than 3 dynamic path parameters.
    severity: warn
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^(.*{{1}.*){4,}
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-limit-path-parameters
  sps-commerce/sps-paths-limit-sub-resources:
    message: The hierarchy of nested resources SHOULD NOT contain more than 8
      resource names in the path.
    severity: warn
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^([^/]*/){9,}
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-limit-sub-resources
  sps-commerce/sps-paths-with-http-methods:
    message: A resource SHOULD NOT contain HTTP methods.
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: (\/get|\/post|\/put|\/delete|\/patch)
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-with-http-methods
  sps-commerce/sps-paths-params-camel-case:
    message: Path parameter keys MUST use camelCase.
    severity: error
    given: $.paths.*.*.parameters[?(@.in=='path')].name
    then:
      function: casing
      functionOptions:
        type: camel
        disallowDigits: true
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-paths-params-camel-case
  sps-commerce/sps-query-params-characters:
    message: "Query parameter keys MUST include only alpha-numeric characters and
      periods: [Aa0-Zz9]'."
    severity: error
    given: $.paths.*.*.parameters[?(@.in=='query')].name
    then:
      function: pattern
      functionOptions:
        match: ^[A-Za-z0-9\.]+$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-query-params-characters
  sps-commerce/sps-query-params-camel-case:
    message: Query parameter keys MUST use camelCase.
    severity: error
    given: $.paths.*.*.parameters[?(@.in=='query')].name
    then:
      function: casing
      functionOptions:
        type: camel
        disallowDigits: true
        separator:
          char: .
          allowLeading: false
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-query-params-camel-case
  sps-commerce/sps-query-params-not-required:
    message: Query parameters MUST be optional.
    severity: error
    given: $.paths.*.*.parameters[?(@.in=='query')].required
    then:
      function: falsy
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-query-params-not-required
  sps-commerce/sps-query-params-no-api-keys:
    message: Query parameters MUST not contain sensitive information, like API
      tokens or keys.
    severity: error
    given: $.paths.*.*.parameters[?(@.in=='query')].name
    then:
      function: pattern
      functionOptions:
        notMatch: apiKey|token
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-query-params-no-api-keys
  sps-commerce/sps-query-params-not-in-path:
    message: Paths SHOULD NOT have query parameters in them. They should be defined
      separately in the OpenAPI.
    severity: warn
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: \?
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
    description: sps-query-params-not-in-path
  italia/cache-control-parameter-undocumented:
    description: >-
      Cache usage SHOULD be extensively detailed in the `description` property

      to avoid data leaks or the usage of stale data.


      This rule should ensure in some way that the api provider

      documented extensively the cache usage to avoid data leaks

      or usage of stale data.

      The `no-transform` directive can

      be used in responses to avoid transforming proxies to

      modify (eg. compress) the content.


      For now this ruleset tests:

      * the presence of following keywords
        in the `description`: `max-age`, `private`, `no-store`, `no-cache`,
        `no-transform`.
      * that one and only one between Expires and Cache-Control is used.


      `Cache-Control` and `Expires` should not be used in conjunction,

      because `Cache-Control` overrides `Expires` when `max-age` is set.

      Instead if neither `Cache-Control` or `Expires` are set, clients MAY use
      heuristic cache

      like described in RFC7234.
    message: "[RFC7234] Cache usage must be documented in the description (include
      keywords like max-age, no-store, etc.)."
    formats:
      - oas3
    severity: warn
    recommended: true
    given: $..[parameters][?(@ && @.in == "header" && @.name && @.name.match &&
      @.name.match(/Cache-Control/i))]
    then:
      - field: description
        function: truthy
      - field: description
        function: pattern
        functionOptions:
          match: .*(max-age|private|no-store|no-cache|no-transform).*
    tags:
      - source:italia
      - format:openapi
      - category:documentation
  italia/cache-responses-undocumented:
    description: >-
      Cache usage SHOULD be extensively detailed in the `description` property

      to avoid data leaks or the usage of stale data.


      This rule should ensure in some way that the api provider

      documented extensively the cache usage to avoid data leaks

      or usage of stale data.

      The `no-transform` directive can

      be used in responses to avoid transforming proxies to

      modify (eg. compress) the content.


      For now this ruleset tests:

      * the presence of following keywords
        in the `description`: `max-age`, `private`, `no-store`, `no-cache`,
        `no-transform`.
      * that one and only one between Expires and Cache-Control is used.


      `Cache-Control` and `Expires` should not be used in conjunction,

      because `Cache-Control` overrides `Expires` when `max-age` is set.

      Instead if neither `Cache-Control` or `Expires` are set, clients MAY use
      heuristic cache

      like described in RFC7234.
    message: "[RFC7234] Cache usage for response header must be documented in its
      description."
    formats:
      - oas3
    severity: info
    recommended: true
    given: $..[responses][?(@property[0] == "2" )][headers].[?(@property &&
      @property.match && @property.match(/Cache-Control|Expires/i))]
    then:
      - field: description
        function: truthy
      - field: description
        function: pattern
        functionOptions:
          match: .*(max-age|private|no-store|no-cache|no-transform).*
    tags:
      - source:italia
      - format:openapi
      - category:documentation
  italia/cache-responses-indeterminate-behavior:
    description: >-
      Cache usage SHOULD be extensively detailed in the `description` property

      to avoid data leaks or the usage of stale data.


      This rule should ensure in some way that the api provider

      documented extensively the cache usage to avoid data leaks

      or usage of stale data.

      The `no-transform` directive can

      be used in responses to avoid transforming proxies to

      modify (eg. compress) the content.


      For now this ruleset tests:

      * the presence of following keywords
        in the `description`: `max-age`, `private`, `no-store`, `no-cache`,
        `no-transform`.
      * that one and only one between Expires and Cache-Control is used.


      `Cache-Control` and `Expires` should not be used in conjunction,

      because `Cache-Control` overrides `Expires` when `max-age` is set.

      Instead if neither `Cache-Control` or `Expires` are set, clients MAY use
      heuristic cache

      like described in RFC7234.
    message: "[RFC7234] Use either 'Cache-Control' or 'Expires' header, but not both
      or neither."
    formats:
      - oas3
    severity: info
    recommended: true
    given: $..[responses][?(@property[0] == "2")][headers]
    then:
      - function: schema
        functionOptions:
          schema:
            type: object
            oneOf:
              - required:
                  - Cache-Control
                not:
                  required:
                    - Expires
              - required:
                  - Expires
                not:
                  required:
                    - Cache-Control
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/paths-kebab-case:
    description: |
      Paths should be kebab-case (e.g. `path-parameter`).

      See Italian recommendation RAC_REST_NAME_002.
    message: '[RAC_REST_NAME_002] Path "{{property}}" must be kebab-case (e.g.,
      /my-resource-name).'
    severity: warn
    recommended: true
    given: $.paths[*]
    then:
      field: "@property"
      function: pattern
      functionOptions:
        match: ^(/[a-z0-9-.]+|/{[a-zA-Z0-9_]+})+$
    tags:
      - source:italia
      - format:openapi
      - category:naming
  italia/request-headers-train-case:
    description: |
      Headers should be Train-Case / HTTP-Header-Case (e.g. `X-Header-Name`).

      See Italian recommendation RAC_REST_NAME_003.
    message: '[RAC_REST_NAME_003] Header "{{value}}" must be Train-Case /
      HTTP-Header-Case.'
    severity: hint
    recommended: true
    given:
      - $..[parameters][?(@ && @.in=="header")].name
    then:
      function: pattern
      functionOptions:
        match: ^([A-Z][a-zA-Z0-9]*(-[A-Z][a-zA-Z0-9]*)*)$
    tags:
      - source:italia
      - format:openapi
      - category:naming
  italia/response-headers-train-case:
    description: |
      Headers should be Train-Case / HTTP-Header-Case (e.g. `X-Header-Name`).

      See Italian recommendation RAC_REST_NAME_003.
    message: '[RAC_REST_NAME_003] Response header "{{property}}" must be Train-Case
      / HTTP-Header-Case.'
    severity: hint
    recommended: true
    given:
      - $..[responses][*].headers.*~
    then:
      function: pattern
      functionOptions:
        match: ^([A-Z][a-zA-Z0-9]*(-[A-Z][a-zA-Z0-9]*)*)$
    tags:
      - source:italia
      - format:openapi
      - category:naming
  italia/schema-camel-case:
    description: |-
      Schema definitions should be CamelCase
      (pascal case with blank separator char).

      This improves readability and avoid
      confusion between schema names and properties.

      ```
      Website:
        type: string
        format: url
      Person:
        type: object
        properties:
          website:
            $ref: "#/components/schemas/Website"
      ``` 
    message: Schema name "{{property}}" should be PascalCase (e.g., MySchema).
    severity: hint
    recommended: true
    given: $.components.schemas[*]
    then:
      field: "@property"
      function: casing
      functionOptions:
        type: pascal
        separator:
          char: ""
    tags:
      - source:italia
      - format:openapi
      - category:naming
  italia/no-forbidden-headers:
    description: |-
      OAS do not allow using the following HTTP headers in a specification
      file: Authorization, Content-Type and Accept.
      You MUST use the associate functionalities provided by OAS, instead.
    message: Do not define 'Authorization', 'Content-Type' or 'Accept' as headers;
      use the specific OAS fields for security schemes or media types instead.
    severity: error
    given:
      - $..parameters[?(@ && @.in == 'header')].name
      - $..[responses][*].headers.*~
    then:
      function: pattern
      functionOptions:
        notMatch: /^(accept|content-type|authorization)$/i
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/no-x-headers-request:
    description: "'HTTP' headers SHOULD NOT start with 'X-' RFC6648."
    severity: warn
    given:
      - $..parameters[?(@ && @.in == 'header')].name
    message: "[RFC6648] Avoid using 'X-' prefix for header '{{value}}'. Use
      meaningful names instead."
    recommended: true
    type: style
    then:
      function: pattern
      functionOptions:
        match: /^([^x]|.[^-])|RateLimit-|Correlation-ID|ReplyTo/i
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/no-x-headers-response:
    description: "'HTTP' headers SHOULD NOT start with 'X-' RFC6648."
    severity: warn
    given:
      - $..[responses][*].headers.*~
    message: "[RFC6648] Avoid using 'X-' prefix for response header '{{property}}'.
      Use a meaningful name instead."
    recommended: true
    type: style
    then:
      function: pattern
      functionOptions:
        match: /^([^x]|.[^-])|RateLimit-|Correlation-ID|ReplyTo/i
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/http-request-GET-no-body:
    description: |-
      A `GET` request MUST NOT accept a `requestBody`
      because this behavior is not interoperable.
      Moreover intermediaries such as reverse proxies
      are allowed to strip the content from `GET` requests.

      See RFC7231 for further information.
    message: "[RFC7231] A GET request MUST NOT accept a requestBody: {{error}}."
    severity: error
    given: $.paths..get.requestBody
    then:
      function: undefined
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/http-request-DELETE-no-body:
    description: |-
      Sending a `requestBody` in a `DELETE` request 
      is not considered interoperable.
      Moreover intermediaries such as reverse proxies
      might strip the content from `DELETE` requests.

      See RFC7231 for further information.
    message: "[RFC7231] A DELETE request SHOULD NOT accept a requestBody: {{error}}."
    severity: warn
    given: $.paths..delete.requestBody
    then:
      function: undefined
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/http-response-no-content-204-205:
    description: >-
      Responses with the following status codes usually expected to include a
      content, which might have zero length: 200, 201, 202, 203, 206.

      Responses with status code 204 and 205 MUST NOT include a content.

      See RFC7231 for further information.
    message: "[RFC7231] A 204 or 205 response must not include a message body."
    severity: error
    given: $..paths..responses[?(@property && @property.match("(204|205)") )]
    then:
      field: content
      function: falsy
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/http-response-content-2xx:
    description: >-
      Responses with the following status codes usually expected to include a
      content, which might have zero length: 200, 201, 202, 203, 206.

      Responses with status code 204 and 205 MUST NOT include a content.

      See RFC7231 for further information.
    message: "[RFC7231] A 2xx response should include a message body."
    severity: hint
    given: $..paths..responses[?( @property &&
      @property.match("(200|201|202|203|206)") )]
    then:
      - field: content
        function: truthy
      - field: content
        function: schema
        functionOptions:
          schema:
            type: object
            minProperties: 1
            additionalProperties:
              required:
                - schema
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/servers-description:
    description: Servers must have a description.
    message: Server should have a description explaining its purpose (e.g.,
      Production, Sandbox).
    given:
      - $.servers[*]
      - $.paths..servers[*]
    severity: warn
    recommended: true
    then:
      field: description
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:security
  italia/servers-use-https:
    description: |-
      Servers must use https to ensure the origin of the responses
      and protect the integrity and the  confidentiality of the communication.

      You can use `http://` only on sandboxes environment.
      Use `x-sandbox: true` to skip this kind of check.
    message: "Non-sandbox URL '{{value}}' must use https. Set 'x-sandbox: true' to
      skip this check for development environments."
    given:
      - $.servers[?(@ && @["x-sandbox"] != true)].url
      - $.paths..servers[?(@ && @["x-sandbox"] != true)].url
    severity: error
    recommended: true
    then:
      function: pattern
      functionOptions:
        match: ^https://.*
    tags:
      - source:italia
      - format:openapi
      - category:security
  italia/has-x-summary:
    message: The API info object must contain an `x-summary` field.
    description: >-
      The `#/info/x-summary` can be used to specify a brief, one-liner
      description of your API: this is very useful for catalog purposes (eg.
      this can be shown as your API subtitle in catalogs and developer portals).

      In OAS3.1 you can use the standard `#/info/summary` field.
    given: $
    severity: error
    recommended: true
    type: style
    formats:
      - oas3
    then:
      field: info.x-summary
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:documentation
  italia/has-termsOfService:
    message: The API info object should contain a `termsOfService` URL.
    description: API SHOULD reference the URL of the Terms of Service in
      `#/info/termsOfService`
    given: $
    severity: warn
    recommended: true
    type: style
    formats:
      - oas3
    then:
      field: info.termsOfService
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:general
  italia/has-contact:
    message: The API info object must contain a `contact` object with contact
      information.
    description: "API MUST reference a contact, either url or email in #/info/contact"
    given: $
    severity: error
    recommended: true
    type: style
    formats:
      - oas3
    then:
      field: info.contact
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:documentation
  italia/has-x-api-id:
    message: The API info object should contain an `x-api-id` for tracking purposes.
    description: |-
      The `#/info/x-api-id` field can be used to associate an identifier
      to an API.
      This is useful to track an API even when its `#/info/title` changes.
    given: $
    severity: hint
    recommended: true
    type: style
    then:
      field: info.x-api-id
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:general
  italia/use-semver:
    description: >-
      The API version field should follow

      [semantic
      versioning](https://semver.org/#semantic-versioning-specification-semver).
    severity: error
    recommended: true
    message: The version '{{value}}' is not valid; use semantic versioning (e.g.,
      1.0.0).
    given: $.info.version
    then:
      function: pattern
      functionOptions:
        match: ^[0-9]+.[0-9]+.[0-9]+(-[a-z0-9+.-]+)?
    tags:
      - source:italia
      - format:openapi
      - category:general
  italia/use-recommended-names-in-parameters:
    description: |-
      Use well defined parameter and schema names, deriving them
      from the national ontologies available at https://w3id.org/italia/onto/

      For example, you can model a person using the following names:

      ```
      {
        "en": {
          "given_name": "Mario",
          "family_name": "Rossi",
          "tax_code": "12345678901"
        },
        "it": {
          "nome_proprio": "Mario",
          "cognome": "Rossi",
          "codice_fiscale": "12345678901"
        }
      }
      ```
    message: The parameter name '{{value}}' should align with national ontologies.
      Use standardized names like 'given_name', 'family_name', 'tax_code'.
    formats:
      - oas3
    severity: info
    given: $..parameters.[?(@ && @.name && @.name.match &&
      @.name.match(/^(nome|name|surname|cf|fiscal_?code|fiscal_?number|first_?name|last_?name)$/i)
      )].name
    then:
      function: pattern
      functionOptions:
        match: //
    tags:
      - source:italia
      - format:openapi
      - category:naming
  italia/use-recommended-names-in-schemas:
    description: |-
      Use well defined parameter and schema names, deriving them
      from the national ontologies available at https://w3id.org/italia/onto/
    message: The property name '{{value}}' should align with national ontologies.
      Use standardized names like 'given_name', 'family_name', 'tax_code'.
    formats:
      - oas3
    severity: info
    given: $..[?(@ && @.type=="object")].properties.[?( @property && @property.match
      &&
      @property.match(/^(nome|name|surname|cf|fiscal_?code|fiscal_?number|first_?name|last_?name)$/i)
      )]
    then:
      field: "@property"
      function: undefined
    tags:
      - source:italia
      - format:openapi
      - category:naming
  italia/no-method-name-in-operationId:
    description: |-
      Avoid using method names in `operationId`s because it couples
      the API design with the implementation.

      An operation that edits an entry can be published with different methods,
      for example either POST, PUT or PATCH, and while evolving the API
      you could decide to associate an operationId with another method.

      You can use for example

      ```
      openapi: 3.0.1
      ...
      paths:
        /entries:
          get:
            operationId: list_entries
          post:
            operationId: create_entry
        /entries/{id}:
          put:
            operationId: upsert_entry
          patch:
            operationId: edit_entry
      ```
    message: The operationId '{{value}}' starts with an HTTP verb (get, post, put,
      delete, patch). Use a resource-centric name instead.
    formats:
      - oas3
    severity: hint
    given: $..[?(@ && @.operationId && @.operationId.match &&
      @.operationId.match(/^(get|post|put|delete|patch|head)/i) )].operationId
    then:
      function: pattern
      functionOptions:
        match: //
    tags:
      - source:italia
      - format:openapi
      - category:naming
  italia/number-format:
    description: >-
      Schema of type number or integer must specify a format

      to express the associated datatype, eg. `int32`, `int64`, ...


      You can express similar requirements using the `minimum` and `maximum`
      properties.


      See recommendation RAC_REST_FORMAT_004.
    message: "[RAC_REST_FORMAT_004] The schema of type 'number' must specify a
      format (e.g., float, double)."
    formats:
      - oas3
    severity: error
    recommended: true
    given: $..[?(@ && @.type=="number")]
    then:
      field: format
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:general
  italia/integer-format:
    description: >-
      Schema of type number or integer must specify a format

      to express the associated datatype, eg. `int32`, `int64`, ...


      You can express similar requirements using the `minimum` and `maximum`
      properties.


      See recommendation RAC_REST_FORMAT_004.
    message: "[RAC_REST_FORMAT_004] The schema of type 'integer' must specify a
      format (e.g., int32, int64)."
    formats:
      - oas3
    severity: error
    recommended: true
    given: $..[?(@ && @.type=="integer")]
    then:
      field: format
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:general
  italia/allowed-integer-format:
    description: |-
      To improve interoperability, integer and number formats are constrained
      to a shared subset.

      See recommendation RAC_REST_FORMAT_004.
    message: '[RAC_REST_FORMAT_004] Type format is "{{value}}", expected one of
      [int32, int64]. {{path}}'
    formats:
      - oas3
    severity: hint
    recommended: true
    given: $..[?(@ && @.type=="integer")].format
    then:
      function: enumeration
      functionOptions:
        values:
          - int32
          - int64
    tags:
      - source:italia
      - format:openapi
      - category:general
  italia/allowed-number-format:
    description: |-
      To improve interoperability, integer and number formats are constrained
      to a shared subset.

      See recommendation RAC_REST_FORMAT_004.
    message: '[RAC_REST_FORMAT_004] Type format is "{{value}}", expected one of
      [decimal32, decimal64, decimal128, float, double]. {{path}}'
    formats:
      - oas3
    severity: hint
    recommended: true
    given: $..[?(@ && @.type=="number")].format
    then:
      function: enumeration
      functionOptions:
        values:
          - decimal32
          - decimal64
          - float
          - double
          - decimal128
    tags:
      - source:italia
      - format:openapi
      - category:general
  italia/no-swagger-2:
    description: Swagger 2 files are not allowed. Use OpenAPI >= 3.0
    message: The document uses Swagger 2.0, which is deprecated. Please upgrade to
      OpenAPI 3.0 or higher.
    given: $
    severity: error
    recommended: true
    type: style
    formats:
      - oas2
    then:
      field: swagger
      function: falsy
    tags:
      - source:italia
      - format:openapi
      - category:general
  italia/oas3-valid-media-example:
    description: Ensure examples are valid against their schema.
    message: "Example value is invalid against the schema. Check for structural
      issues like 'nullable: true' without an explicit 'type' in the schema
      definition. Details: {{error}}"
    severity: error
    recommended: true
    given: $
    then:
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:documentation
  italia/sec-securitySchemes-oauth-http:
    description: OAuth2 endpoints must use `https://`
    message: "[RFC6749] OAuth2 authorization and token endpoints must use HTTPS."
    formats:
      - oas3
    severity: error
    recommended: true
    given:
      - $..[securitySchemes][?(@ && @.type=="oauth2")][*].[?(@property &&
        @property.match(/Url$/i))]
    then:
      - function: pattern
        functionOptions:
          match: ^https://
    tags:
      - source:italia
      - format:openapi
      - category:security
  italia/sec-securitySchemes-oauth-allowed-flows:
    description: |-
      The OAuth2 authorization framework defines various
      [grant types](https://tools.ietf.org/html/rfc6749#section-1.3),
      most notably the [AuthorizationCode](https://tools.ietf.org/html/rfc6749#section-1.3.1)
      and the [Client Credentials](https://tools.ietf.org/html/rfc6749#section-1.3.4).

      Some grant types are now considered insecure
      and MUST not be used, including `implicit` and `password`.
      The new [OAuth2.1](https://tools.ietf.org/html/draft-ietf-oauth-v2-1-01)
      still in draft, removes them and suggests to
      replace the `implicit` with `authorizationCode` + PKCE defined in RFC7636.

      For further info, see the OAuth2 section of [API Security Guidelines](https://docs.italia.it/AgID/documenti-in-consultazione/lg-sicurezza-interoperabilita-docs/).
    message: '[RFC7636] Do not use oauth2 insecure flow: "{{property}}".'
    formats:
      - oas3
    severity: error
    recommended: true
    given:
      - $..[?(@ && @.type=="oauth2")].flows
    then:
      - field: implicit
        function: falsy
      - field: password
        function: falsy
    tags:
      - source:italia
      - format:openapi
      - category:security
  italia/patch-media-type:
    description: >-
      The PATCH specification explicits that the request body contains

      a "patch document" describing the changes to be applied

      to the target resource.


      To avoid confusion, [this
      errata](https://www.rfc-editor.org/errata/eid3169)

      explains that `application/json` is not an appropriate media-type for
      `PATCH`.


      A correct example of PATCH using eg. `application/json-patch+json`
      media-type

      defined in RFC6902.


      ```

      paths:
        /books/{book_id}:
          patch:
            requestBody:
              content:
                application/json-patch+json:
                  schema:
                    type: array
                    ...
                  example: [{ "op": "add", "path": "/baz", "value": "qux" }]
      ```
    message: "[RFC6902] The `application/json` media type is not appropriate for
      PATCH requests. Use a more specific media type like
      `application/json-patch+json`."
    formats:
      - oas3
    severity: error
    recommended: true
    given: $..[patch][requestBody][content]
    then:
      field: application/json
      function: falsy
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/patch-without-request-body:
    description: |-
      The PATCH method requests that a set of changes described in the
      `requestBody` be applied to the target resource.
      A PATCH specification without a `requestBody`
      just applies no changes to the target resource.

      Since PATCH has impacts on caches, using it
      on a different target resource may result in non-interoperable
      behavior.

      For example, to modify the resource at `/user/123`,
      you can use the following PATCH request:

      ```
      PATCH /user/123
      Content-Type: application/json-patch+json

      [{"op": "replace", "path": "enable", "value": true}]
      ```

      or  POST request with the semantic implied by the target url:

      ```
      POST /user/123/enable
      ```

      Instead, the following request
      is expected to modify the `/user/123/enable`
      subresource, and not the `/user/123` one.

      ```
      PATCH /user/123/enable
      ````
    message: PATCH requests must include a `requestBody` and the `requestBody` must
      be required.
    severity: error
    given: $.paths.*.patch
    then:
      - field: requestBody
        function: defined
        message: PATCH requests must include a `requestBody`.
      - field: requestBody.required
        function: truthy
        message: The `requestBody` of a PATCH request must be required.
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/patch-json-patch-mediatype:
    description: >-
      A correct example of PATCH using eg. `application/json-patch+json`
      media-type

      defined in RFC6902.


      ```

      paths:
        /books/{book_id}:
          patch:
            requestBody:
              content:
                application/json-patch+json:
                  schema:
                    type: array
                    ...
                  example: [{ "op": "add", "path": "/baz", "value": "qux" }]
      ```
    message: "[RFC6902] application/json-patch+json is not an array. {{path}}"
    formats:
      - oas3
    severity: warn
    recommended: true
    given: $..[patch][requestBody][content][application/json-patch+json][schema]
    then:
      field: type
      function: pattern
      functionOptions:
        match: array
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/paths-status:
    description: >-
      You must define a `/status` path that can be used to health-check the API.

      Using this path avoids the arbitrary usage of a server URL for
      health-check

      scope.


      The `/status` endpoint should return:

      - a `application/json` or `application/problem+json` response with 200 OK
      when the service is up.

      - a `application/problem+json` response with 503 Service Unavailable when
      the service is down.


      The service provider is free to define the implementation logic for this
      path.
    message: The "/status" path must be defined for API health-checks.
    severity: error
    recommended: true
    given: $.paths
    then:
      function: schema
      functionOptions:
        schema:
          oneOf:
            - type: object
              required:
                - /status
              properties:
                /status:
                  type: object
            - type: object
              additionalProperties: false
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/paths-status-return-json:
    description: The "/status" endpoint must return "application/json" or
      "application/problem+json" when the service is Up.
    message: The "/status" (Up) response must be "application/json" or
      "application/problem+json".
    severity: error
    recommended: true
    given: $.paths.'/status'.get.responses.200.content.*~
    then:
      function: enumeration
      functionOptions:
        values:
          - application/json
          - application/problem+json
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/paths-status-return-problem:
    description: The "/status" endpoint must return "application/problem+json" for
      all 4xx and 5xx error responses (Down state).
    message: The "/status" (Down) response ({{property}}) must be
      "application/problem+json".
    severity: error
    recommended: true
    given: $.paths.'/status'.get.responses[?(@property.match(/^(4|5)/))].content.*~
    then:
      function: enumeration
      functionOptions:
        values:
          - application/problem+json
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/paths-status-problem-schema:
    description: The "/status" error response (4xx/5xx) must be a Problem object (RFC7807).
    message: The "/status" (Down) response schema ({{property}}) must include
      standard Problem fields (status, title, detail).
    severity: warn
    recommended: true
    given: $.paths.'/status'.get.responses[?(@property.match(/^(4|5)/))].content.[schema]
    then:
      - function: truthy
        field: properties.status
        message: The "/status" (Down) response schema must include the standard Problem
          field "status".
      - function: truthy
        field: properties.title
        message: The "/status" (Down) response schema must include the standard Problem
          field "title".
      - function: truthy
        field: properties.detail
        message: The "/status" (Down) response schema must include the standard Problem
          field "detail".
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/paths-http-method:
    description: >-
      When you design a REST API, you don't usually need to mention terms like

      `get`, `delete` and so on in your `paths`, because this information is

      conveyed by the HTTP method.


      Instead of using


      ```

      POST /books/1234/delete HTTP/1.1

      Host: api.example

      ```


      You can simply call


      ```

      DELETE /books/1234 HTTP/1.1

      Host: api.example

      ```


      Similarly you don't need verbs like `list` or `create` because

      the HTTP Semantics RFC7231 supports this kind of actions natively

      with proper methods and status code.


      Instead of


      ```

      POST /create/user HTTP/1.1

      Host: api.example

      Content-Type: application/json


      {"given_name": "Mario"}

      ```


      You can use

      ```

      POST /create/user HTTP/1.1

      Host: api.example

      Content-Type: application/json


      {"given_name": "Mario"}

      ```


      returning a proper response


      ```

      HTTP/1.1 201 Created

      Location: /users/1234


      ```


      This simplifies securing your API as you know beforehand the kind of
      action

      which is going to be performed.
    message: '[RFC7231] Path "{{property}}" contains an HTTP method or action verb
      (e.g., get, list, create); use proper HTTP methods instead.'
    severity: hint
    recommended: true
    given:
      - $.paths[?(@property && @property.match(
        "/(get|post|put|delete|patch)[\/A-Z_\-]?" ))]
      - $.paths[?(@property && @property.match(
        "/(create|remove|list)[\/A-Z_\-]?" ))]
    then:
      field: "@property"
      function: undefined
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/use-problem-json-for-errors:
    description: |-
      
      Error management is a key enabler of a resilient API ecosystem.
      Enforcing a consistent schema for errors between different APIs,
      enables client to properly implement an error management strategy,
      with positive impacts for users.

      Error responses should return one of the media-type
      defined in RFC7807:
      - `application/problem+json`
      - `application/problem+xml`

      An example of a valid response:

      ```
      responses:
        "503":
          content:
            application/problem+json:
              schema:
                ...
      ```
    message: "[RFC9457] Error response content type must be
      'application/problem+json' or 'application/problem+xml'."
    formats:
      - oas3
    severity: error
    given: $.paths.[*].responses[?(@property && @property.match(/^(4|5|default)/) &&
      !@["x-noqa"] )].content.*~
    then:
      function: enumeration
      functionOptions:
        values:
          - application/problem+xml
          - application/problem+json
    tags:
      - source:italia
      - format:openapi
      - category:errors
  italia/use-problem-schema:
    description: |-
      WARN: This rule is under implementation and just provides an hint.

      Error management is a key enabler of a resilient API ecosystem.
      Enforcing a consistent schema for errors between different APIs,
      enables client to properly implement an error management strategy,
      with positive impacts for users.

      This rule inspects the schema returned by an error response and
      verifies whether it contains the main properties defined in RFC7807:
      `status`, `title` and `detail`.

      An example of a valid payload is
      ```
      {
       "title": "Not Found",
       "status": 404,
       "detail": "Book does not exist; id: 123"
      }
      ```

      See recommendation RAC_REST_NAME_007.
    message: "[RFC9457] Error response schema does not conform to RFC9457. Expected
      at least two of: 'title', 'status', 'type', 'detail'."
    formats:
      - oas3
    severity: hint
    recommended: true
    given: $..[responses][?(@property && @property.match(/^(4|5|default)/)  &&
      !@["x-noqa"] )][schema].properties
    then:
      function: schema
      functionOptions:
        schema:
          anyOf:
            - type: object
              required:
                - title
                - status
            - type: object
              required:
                - title
                - type
            - type: object
              required:
                - type
                - status
            - type: object
              required:
                - title
                - detail
    tags:
      - source:italia
      - format:openapi
      - category:errors
  italia/hint-problem-schema:
    description: |-
      
      WARN: This rule is under implementation and just provides an hint.

      Error management is a key enabler of a resilient API ecosystem.
      Enforcing a consistent schema for errors between different APIs,
      enables client to properly implement an error management strategy,
      with positive impacts for users.

      Errors should return RFC7807 objects. Instead, this schema
      seems to use non standard properties such as:
      `message`, `msg` and `code`.

      An error of the following form

      ```
      {
        "msg": "Book with id: 123 does not exist.",
        "code": 6063
      }
      ```

      can be expressed in RFC7807 with

      ```
      {
        "detail": "Book with id: 123 does not exist.",
        "type": "https://api.example/v1/errors/6063",
        "status": 404,
        "title": "Not Found"
      }
      ```

      Returning an URI in `type`, instead of an opaque `code` can help
      the client in better identifying the error; moreover the URI
      though it should not be dereferenced automatically, can return
      an actual resource providing guidance in addressing the issue.

      See recommendation RAC_REST_NAME_007.
    message: "[RFC9457] Error response uses non-standard fields ('message', 'code',
      'msg'). Replace them with RFC9457 fields: 'detail', 'type', 'status',
      'title'."
    formats:
      - oas3
    severity: hint
    recommended: true
    given: $..[responses][?(@property && @property.match(/^(4|5|default)/)  &&
      !@["x-noqa"] )][schema][properties].*~
    then:
      function: pattern
      functionOptions:
        notMatch: message|code|msg
    tags:
      - source:italia
      - format:openapi
      - category:errors
  italia/missing-retry-after:
    description: >-
      When a client is warned about a temporary server issue with a 503 status
      code,

      the server should explicitly communicate how long to wait

      before issuing further requests using the Retry-After header.


      Retry-After is defined in RFC7231.
    message: "[RFC7231] A 503 response must include the `Retry-After` header."
    formats:
      - oas3
    severity: warn
    recommended: true
    given: $..[responses][?(@property == "503" )][headers]
    then:
      field: Retry-After
      function: truthy
    tags:
      - source:italia
      - format:openapi
      - category:pagination
  italia/missing-ratelimit:
    description: |-
      Ratelimiting an API preserves a service and limits attack scenario
      [see API4:2019 Lack of Resources & Rate Limiting](https://owasp.org/www-project-api-security).

      APIs should use the following headers on successful and client error responses:
      - `X-RateLimit-Limit`: number of total requests in a give time window
      - `X-RateLimit-Remaining`: remaining requests in the current window
      - `X-RateLimit-Reset`: number of seconds before the window resets

      An example set of headers is the following

      ```
      X-Ratelimit-Limit: 100
      X-Ratelimit-Remaining: 40
      X-Ratelimit-Reset: 12
      ```

      A standardization proposal for ratelimit headers is ongoing
      inside the IETF HTTPAPI Workgroup.
      See [the draft](https://datatracker.ietf.org/doc/draft-ietf-httpapi-ratelimit-headers/)
    message: "[RFC7231] 2xx/4xx responses must include all three rate-limit headers
      (Limit, Remaining, Reset) using one consistent prefix: either
      'X-RateLimit-' or 'RateLimit-'."
    formats:
      - oas3
    severity: warn
    recommended: true
    given: $..[responses][?(@property[0] == "2" || (@property[0] == "4" && @property
      != "429"))][headers]
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          allOf:
            - oneOf:
                - required:
                    - X-RateLimit-Limit
                  not:
                    required:
                      - RateLimit-Limit
                - required:
                    - RateLimit-Limit
                  not:
                    required:
                      - X-RateLimit-Limit
            - oneOf:
                - required:
                    - X-RateLimit-Remaining
                  not:
                    required:
                      - RateLimit-Remaining
                - required:
                    - RateLimit-Remaining
                  not:
                    required:
                      - X-RateLimit-Remaining
            - oneOf:
                - required:
                    - X-RateLimit-Reset
                  not:
                    required:
                      - RateLimit-Reset
                - required:
                    - RateLimit-Reset
                  not:
                    required:
                      - X-RateLimit-Reset
    tags:
      - source:italia
      - format:openapi
      - category:pagination
  italia/ratelimit-429-presence:
    description: >-
      429 (Too Many Requests) responses must include either the `Retry-After`
      header 

      or a complete set of RateLimit headers (`Limit`, `Remaining`, `Reset`).
    message: "[RFC6585] A 429 response must include 'Retry-After' or a full set of
      rate-limit headers: X-RateLimit-{Limit,Remaining,Reset} or
      RateLimit-{Limit,Remaining,Reset}."
    severity: warn
    formats:
      - oas3
    given: $..[responses][?(@property == "429")][headers]
    then:
      function: schema
      functionOptions:
        schema:
          anyOf:
            - required:
                - Retry-After
            - required:
                - RateLimit-Limit
                - RateLimit-Remaining
                - RateLimit-Reset
            - required:
                - X-RateLimit-Limit
                - X-RateLimit-Remaining
                - X-RateLimit-Reset
    tags:
      - source:italia
      - format:openapi
      - category:pagination
  italia/ratelimit-429-completeness:
    description: >-
      If RateLimit headers are provided for a 429 response, all three headers 

      (Limit, Remaining, Reset) must be present and follow the same naming
      convention 

      (standard or X- prefix). 

      If both Retry-After and Reset are present, they should ideally represent 

      the same time interval.
    message: "[RFC6585] A 429 response must include all three rate-limit headers
      (Limit, Remaining, Reset) using one consistent prefix: either
      'X-RateLimit-' or 'RateLimit-', never mixed."
    severity: error
    formats:
      - oas3
    given: $..[responses][?(@property == "429")][headers][?(@ &&
      (@["X-RateLimit-Limit"] || @["X-RateLimit-Remaining"] ||
      @["X-RateLimit-Reset"] || @["RateLimit-Limit"] || @["RateLimit-Remaining"]
      || @["RateLimit-Reset"]))]
    then:
      function: schema
      functionOptions:
        schema:
          oneOf:
            - allOf:
                - required:
                    - RateLimit-Limit
                    - RateLimit-Remaining
                    - RateLimit-Reset
                - not:
                    anyOf:
                      - required:
                          - X-RateLimit-Limit
                      - required:
                          - X-RateLimit-Remaining
                      - required:
                          - X-RateLimit-Reset
            - allOf:
                - required:
                    - X-RateLimit-Limit
                    - X-RateLimit-Remaining
                    - X-RateLimit-Reset
                - not:
                    anyOf:
                      - required:
                          - RateLimit-Limit
                      - required:
                          - RateLimit-Remaining
                      - required:
                          - RateLimit-Reset
    tags:
      - source:italia
      - format:openapi
      - category:pagination
  italia/response-with-json-object:
    description: |-
      JSON responses MUST use JSON objects, in order to be extensible.

      For example, instead of a list `[1, 2, 3]` you should return
      an object `{"items": [1, 2, 3]}`.

      This allows the schema to evolve in a backward compatible ways.

      There are notable exceptions when specific media types are involved,
      for example json-patch is an array (see RFC6902).
    message: 'JSON responses must return an object (`{}`), not {{value}}. Wrap
      arrays in an object to allow future extensibility (e.g., `{"items":
      [...]}`). {{path}}'
    severity: warn
    recommended: true
    given:
      - $..[responses][*][content][?(@property && @property.match("json$") &&
        !@property.match(/json-patch\+json$/))][schema].type
    then:
      function: pattern
      functionOptions:
        match: object
    tags:
      - source:italia
      - format:openapi
      - category:structure
  italia/sec-apikeys-url:
    description: |-
      API Keys are (usually opaque) strings that
      are passed in headers, cookies or query parameters
      to access APIs.

      Those keys can be eavesdropped, especially when they are stored
      in cookies or passed as URL parameters.

      ```
      security:
      - ApiKey: []
      paths:
        /books: {}
        /users: {}
      securitySchemes:
        ApiKey:
          type: apiKey
          in: cookie
          name: X-Api-Key
      ```
    message: "[RAC_GEN_004] API key must not be passed as a query parameter. Use
      header-based authentication (in: header) to prevent exposure in URLs and
      server logs."
    formats:
      - oas3
    severity: error
    recommended: true
    given:
      - $..[securitySchemes][?(@ && @.type=="apiKey")].in
    then:
      - function: pattern
        functionOptions:
          notMatch: ^(query)$
    tags:
      - source:italia
      - format:openapi
      - category:security
  italia/sec-credentials-parameters:
    description: |-
      URL parameters MUST NOT contain credentials such as
      apikey, password, or secret.

      See [RAC_GEN_004](https://docs.italia.it/italia/piano-triennale-ict/lg-modellointeroperabilita-docs/it/bozza/doc/04_Raccomandazioni%20di%20implementazione/04_raccomandazioni-tecniche-generali/01_globali.html?highlight=credenziali#rac-gen-004-non-passare-credenziali-o-dati-riservati-nellurl)
    message: "[RAC_GEN_004] Parameter '{{error}}' must not carry credentials
      (password, secret, API key) in the URL. Move sensitive data to request
      headers or body."
    formats:
      - oas3
    severity: error
    recommended: true
    given:
      - $..parameters[?(@ && @.in && @.in.match(/query|path/))].name
    then:
      - function: pattern
        functionOptions:
          notMatch: /^.*(password|secret|apikey).*$/i
    tags:
      - source:italia
      - format:openapi
      - category:security
