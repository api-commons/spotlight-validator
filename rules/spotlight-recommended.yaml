      ```

      POST /books/1234/delete HTTP/1.1

      Host: api.example

      ```


      You can simply call


      ```

      DELETE /books/1234 HTTP/1.1

      Host: api.example

      ```


      Similarly you don't need verbs like `list` or `create` because

      the HTTP Semantics RFC7231 supports this kind of actions natively

      with proper methods and status code.


      Instead of


      ```

      POST /create/user HTTP/1.1

      Host: api.example

      Content-Type: application/json


      {"given_name": "Mario"}

      ```


      You can use

      ```

      POST /create/user HTTP/1.1

      Host: api.example

      Content-Type: application/json


      {"given_name": "Mario"}

      ```


      returning a proper response


      ```

      HTTP/1.1 201 Created

      Location: /users/1234


      ```


      This simplifies securing your API as you know beforehand the kind of
      action

      which is going to be performed.
    message: API "path" contains a name of an http method. {{error}}
    severity: hint
    recommended: true
    given:
      - $.paths[?(@property.match( /\/(get|post|put|delete|patch)[\/A-Z_\-]?/
        ))]~
      - $.paths[?(@property.match( /\/(create|remove|list)[\/A-Z_\-]?/ ))]~
    then:
      field: "@key"
      function: undefined
    tags:
      - source:team-digitale
      - format:openapi
      - category:structure
  team-digitale/use-problem-json-for-errors:
    description: |-
      
      Error management is a key enabler of a resilient API ecosystem.
      Enforcing a consistent schema for errors between different APIs,
      enables client to properly implement an error management strategy,
      with positive impacts for users.

      Error responses should return one of the media-type
      defined in RFC7807:
      - `application/problem+json`
      - `application/problem+xml`

      An example of a valid response:

      ```
      responses:
        "503":
          content:
            application/problem+json:
              schema:
                ...
      ```
    message: Error responses should support RFC7807 in {{path}}.
    formats:
      - oas3
    severity: error
    given: $.paths.[*].responses[?(@property.match(/^(4|5|default)/))].content.*~
    then:
      function: enumeration
      functionOptions:
        values:
          - application/problem+xml
          - application/problem+json
    tags:
      - source:team-digitale
      - format:openapi
      - category:errors
  team-digitale/use-problem-schema:
    description: |-
      WARN: This rule is under implementation and just provides an hint.

      Error management is a key enabler of a resilient API ecosystem.
      Enforcing a consistent schema for errors between different APIs,
      enables client to properly implement an error management strategy,
      with positive impacts for users.

      This rule inspects the schema returned by an error response and
      verifies whether it contains the main properties defined in RFC7807:
      `status`, `title` and `detail`.

      An example of a valid payload is
      ```
      {
       "title": "Not Found",
       "status": 404,
       "detail": "Book does not exist; id: 123"
      }
      ```

      See recommendation RAC_REST_NAME_007.
    message: Your schema doesn't seem to match RFC7807. Are you sure it is ok? {{path}}
    formats:
      - oas3
    severity: hint
    recommended: false
    given: $.paths.[*].responses[?(@property.match(/^(4|5|default)/))][[schema]]
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          properties:
            status:
              type: integer
            title:
              type: string
            detail:
              type: string
    tags:
      - source:team-digitale
      - format:openapi
      - category:errors
  team-digitale/hint-problem-schema:
    description: |-
      
      WARN: This rule is under implementation and just provides an hint.

      Error management is a key enabler of a resilient API ecosystem.
      Enforcing a consistent schema for errors between different APIs,
      enables client to properly implement an error management strategy,
      with positive impacts for users.

      Errors should return RFC7807 objects. Instead, this schema
      seems to use non standard properties such as:
      `message`, `msg` and `code`.

      An error of the following form

      ```
      {
        "msg": "Book with id: 123 does not exist.",
        "code": 6063
      }
      ```

      can be expressed in RFC7807 with

      ```
      {
        "detail": "Book with id: 123 does not exist.",
        "type": "https://api.example/v1/errors/6063",
        "status": 404,
        "title": "Not Found"
      }
      ```

      Returning an URI in `type`, instead of an opaque `code` can help
      the client in better identifying the error; moreover the URI
      though it should not be dereferenced automatically, can return
      an actual resource providing guidance in addressing the issue.

      See recommendation RAC_REST_NAME_007.
    message: Error response doesn't seem to match RFC7807. Are you sure it is ok?
      {{path}}
    formats:
      - oas3
    severity: hint
    recommended: true
    given: $.[responses][?(@property.match(/^(4|5|default)/))][[schema]][properties].*~
    then:
      field: "@key"
      function: pattern
      functionOptions:
        notMatch: message|code|msg
    tags:
      - source:team-digitale
      - format:openapi
      - category:errors
  team-digitale/missing-retry-after:
    description: |-
      When a client is either:
      * throttled out with a 429 status code;
      * warned about a temporary server issue with a 503 status code;
      the server should explicitly communicate how long to wait
      before issuing further requests using the Retry-After header.

      Retry-After is defined in RFC7231.
    message: "Missing ratelimit header: {{property}} in {{path}}"
    formats:
      - oas3
    severity: warn
    recommended: true
    given: $.[responses][?(@property == "429" || @property == "503"  )][headers]
    then:
      field: Retry-After
      function: truthy
    tags:
      - source:team-digitale
      - format:openapi
      - category:general
  team-digitale/missing-ratelimit:
    x-tags:
      - it
    description: |-
      Ratelimiting API preserves a service and limits attack scenario
      [see API4:2019 Lack of Resources & Rate Limiting](https://owasp.org/www-project-api-security).

      APIs should use the following headers at least on successful responses:
      - `X-RateLimit-Limit`: number of total requests in a give time window
      - `X-RateLimit-Remaining`: remaining requests in the current window
      - `X-RateLimit-Reset`: number of seconds before the window resets

      An example set of headers is the following

      ```
      X-Ratelimit-Limit: 100
      X-Ratelimit-Remaining: 40
      X-Ratelimit-Reset: 12
      ```

      A standardization proposal for ratelimit headers is ongoning
      inside the IETF HTTPAPI Workgroup.
      See [the draft](https://datatracker.ietf.org/doc/draft-ietf-httpapi-ratelimit-headers/)
    message: Missing ratelimit headers. {{property}} {{error}} {{path}}
    formats:
      - oas3
    severity: warn
    recommended: true
    given: $.[responses][?(@property[0] == "2" )][headers]
    then:
      - functionOptions:
          properties:
            - X-RateLimit-Limit
            - RateLimit-Limit
        function: xor
      - functionOptions:
          properties:
            - X-RateLimit-Remaining
            - RateLimit-Remaining
        function: xor
      - functionOptions:
          properties:
            - X-RateLimit-Reset
            - RateLimit-Reset
        function: xor
    tags:
      - source:team-digitale
      - format:openapi
      - category:pagination
  team-digitale/response-with-json-object:
    description: |-
      JSON responses MUST use JSON objects, in order to be extensible.

      For example, instead of a list `[1, 2, 3]` you should return
      an object `{"items": [1, 2, 3]}`.

      This allows the schema to evolve in a backward compatible ways.
    message: JSON responses must use json objects (eg "{}"), not {{value}}. {{path}}
    severity: warn
    recommended: true
    given: $.[responses][*][content][?(@property.match("json$"))][schema]
    then:
      field: type
      function: pattern
      functionOptions:
        match: object
    tags:
      - source:team-digitale
      - format:openapi
      - category:structure
  team-digitale/array-boundaries:
    description: >-
      Array size should be limited to mitigate resource exhaustion attacks.

      This can be done using `maxItems` and `minItems`, like in the example

      below.


      ```

      Limited:
        type: array
        maxItems: 10
        items:
          type: string
          format: date
      ```


      You should ensure that the schema referenced in  `items` is constrained
      too.


      If you delegate input validation to a library or framework,

      be sure to test it thoroughly and ensure that it verifies `maxItems`.
    message: Schema of type array must specify maxItems and minItems. {{path}} {{error}}
    formats:
      - oas3
    severity: warn
    recommended: true
    given:
      - $.[?(@.type=="array")]
    then:
      - field: maxItems
        function: defined
      - field: minItems
        function: defined
    tags:
      - source:team-digitale
      - format:openapi
      - category:general
  team-digitale/number-boundaries:
    description: |-
      Numeric values should be limited in size to mitigate resource exhaustion
      using `maximum` and `minimum`.

      If you delegate input validation to a library or framework,
      be sure to test it thoroughly.
    message: Schema of type number or integer must specify a maximum and a minimum.
      {{path}} {{error}}
    formats:
      - oas3
    severity: warn
    recommended: true
    given:
      - $.[?(@.type=="number")]
      - $.[?(@.type=="integer")]
    then:
      - field: maximum
        function: defined
      - field: minimum
        function: defined
    tags:
      - source:team-digitale
      - format:openapi
      - category:general
  team-digitale/no-additionalProperties:
    description: |-
      By default, jsonschema allows additionalProperties. This means
      that schema validators can be bypassed using further, unspecified
      fields.

      While forbidding additionalProperties can create rigidity and hinder
      the evolution of an API - eg making it hard to accept new parameters
      or fields - it is possible that this flexibility can be used
      to bypass the schema validator and force the application to process
      unwanted information.

      Disable `additionalProperties` with `false`

      ```
      Person:
        type: object
        additionalProperties: false
        properties:
          given_name:
            type: string
            pattern: [a-zA-Z ]{24}
      ```

      Or constraint them using `maxProperties`

      ```
      Person:
        type: object
        additionalProperties:
          type: string
          pattern: /+39[0-9]{,14}/
        maxProperties: 3
        properties:
          given_name:
            type: string
            pattern: [a-zA-Z ]{24}
      ```
      - no additionalProperties
      - constrained additionalProperties
    message: "Objects should not allow additionalProperties. Disable them with
      `additionalProperties: false` or constraint them."
    formats:
      - oas3
    severity: warn
    recommended: true
    given:
      - $.[?(@.type=="object" && @.additionalProperties==true)]
    then:
      - field: additionalProperties
        function: falsy
    tags:
      - source:team-digitale
      - format:openapi
      - category:general
  team-digitale/no-default-additionalProperties:
    description: |-
      By default, jsonschema allows additionalProperties. This means
      that schema validators can be bypassed using further, unspecified
      fields.

      While forbidding additionalProperties can create rigidity and hinder
      the evolution of an API - eg making it hard to accept new parameters
      or fields - it is possible that this flexibility can be used
      to bypass the schema validator and force the application to process
      unwanted information.

      Disable `additionalProperties` with `false`

      ```
      Person:
        type: object
        additionalProperties: false
        properties:
          given_name:
            type: string
            pattern: [a-zA-Z ]{24}
      ```

      Or constraint them using `maxProperties`

      ```
      Person:
        type: object
        additionalProperties:
          type: string
          pattern: /+39[0-9]{,14}/
        maxProperties: 3
        properties:
          given_name:
            type: string
            pattern: [a-zA-Z ]{24}
      ```
      - no additionalProperties
      - constrained additionalProperties
    message: "Objects should not allow additionalProperties. Disable them with
      `additionalProperties: false` or constraint them."
    formats:
      - oas3
    severity: warn
    recommended: true
    given:
      - $.[?(@.type=="object" && ! @.additionalProperties)]
    then:
      - field: additionalProperties
        function: defined
    tags:
      - source:team-digitale
      - format:openapi
      - category:general
  team-digitale/constrained-additionalProperties:
    description: |-
      By default, jsonschema allows additionalProperties. This means
      that schema validators can be bypassed using further, unspecified
      fields.

      While forbidding additionalProperties can create rigidity and hinder
      the evolution of an API - eg making it hard to accept new parameters
      or fields - it is possible that this flexibility can be used
      to bypass the schema validator and force the application to process
      unwanted information.

      Disable `additionalProperties` with `false`

      ```
      Person:
        type: object
        additionalProperties: false
        properties:
          given_name:
            type: string
            pattern: [a-zA-Z ]{24}
      ```

      Or constraint them using `maxProperties`

      ```
      Person:
        type: object
        additionalProperties:
          type: string
          pattern: /+39[0-9]{,14}/
        maxProperties: 3
        properties:
          given_name:
            type: string
            pattern: [a-zA-Z ]{24}
      ```
      - no additionalProperties
      - constrained additionalProperties
    message: "Objects should not allow additionalProperties. Disable them with
      `additionalProperties: false` or constraint them."
    formats:
      - oas3
    severity: warn
    recommended: true
    given:
      - $.[?(@.type=="object" && @.additionalProperties
        &&  @.additionalProperties!=true &&  @.additionalProperties!=false )]
    then:
      - field: maxProperties
        function: defined
    tags:
      - source:team-digitale
      - format:openapi
      - category:general
  team-digitale/security-protection-get:
    description: >-
      Your API should be protected by a `security` rule either at

      global or operation level.

      Operations should be protected specially when they

      are tied to non-idempotent HTTP methods like `POST`, `PUT`, `PATCH` and
      `DELETE`.

      This is done with one or more non-empty `security` rules.


      Security rules are defined in the `securityScheme` section.


      An example of a security rule applied at global level.


      ```

      security:

      - BasicAuth: []

      paths:
        /books: {}
        /users: {}
      securitySchemes:
        BasicAuth:
          scheme: http
          type: basic
      ```


      An example of a security rule applied at operation level, which

      eventually overrides the global one


      ```

      paths:
        /books:
          post:
            security:
            - AccessToken: []
      securitySchemes:
        BasicAuth:
          scheme: http
          type: basic
        AccessToken:
          scheme: http
          type: bearer
          bearerFormat: JWT
      ```
    message: "The following operation is not protected by a `security` rule: {{path}}"
    formats:
      - oas3
    severity: info
    recommended: true
    given:
      - $.paths.*.get
    then:
      - field: security
        function: schema
        functionOptions:
          schema:
            items:
              type: object
              minProperties: 1
            minItems: 1
            type: array
    tags:
      - source:team-digitale
      - format:openapi
      - category:security
  team-digitale/security-protection-non-idempotent:
    description: >-
      Your API should be protected by a `security` rule either at

      global or operation level.

      Operations should be protected specially when they

      are tied to non-idempotent HTTP methods like `POST`, `PUT`, `PATCH` and
      `DELETE`.

      This is done with one or more non-empty `security` rules.


      Security rules are defined in the `securityScheme` section.


      An example of a security rule applied at global level.


      ```

      security:

      - BasicAuth: []

      paths:
        /books: {}
        /users: {}
      securitySchemes:
        BasicAuth:
          scheme: http
          type: basic
      ```


      An example of a security rule applied at operation level, which

      eventually overrides the global one


      ```

      paths:
        /books:
          post:
            security:
            - AccessToken: []
      securitySchemes:
        BasicAuth:
          scheme: http
          type: basic
        AccessToken:
          scheme: http
          type: bearer
          bearerFormat: JWT
      ```
    message: "The following non-idempotent operation is not protected by a
      `security` rule: {{path}}"
    formats:
      - oas3
    severity: error
    recommended: true
    given:
      - $.paths.*[?(@property.match(/^(post|put|patch|delete)/))]
    then:
      - field: security
        function: schema
        functionOptions:
          schema:
            items:
              type: object
              minProperties: 1
            minItems: 1
            type: array
    tags:
      - source:team-digitale
      - format:openapi
      - category:security
  team-digitale/securitySchemes-oauth:
    description: >-
      Json Web Tokens RFC7519 is a compact, URL-safe means of representing

      claims to be transferred between two parties. JWT can be enclosed in

      encrypted or signed tokens like JWS and JWE.


      The [JOSE IANA registry](https://www.iana.org/assignments/jose/jose.xhtml)

      provides algorithms information.


      RFC8725 describes common pitfalls in the JWx specifications and in

      their implementations, such as:

      - the ability to ignore algorithms, eg. `{"alg": "none"}`;

      - using insecure algorithms like `RSASSA-PKCS1-v1_5` eg. `{"alg":
      "RS256"}`.


      An API using JWT should explicit in the `description`

      that the implementation conforms to RFC8725.


      ```

      components:
        securitySchemes:
          JWTBearer:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: |-
              A bearer token in the format of a JWS and conformato
              to the specifications included in RFC8725.
      ```
    message: JWT usage should be detailed in `description` {{error}}.
    given:
      - $.[securitySchemes][?(@.type=="oauth2")]
    then:
      - field: description
        function: truthy
      - field: description
        function: pattern
        functionOptions:
          match: .*RFC8725.*
    tags:
      - source:team-digitale
      - format:openapi
      - category:security
  team-digitale/securitySchemes-jwt:
    description: >-
      Json Web Tokens RFC7519 is a compact, URL-safe means of representing

      claims to be transferred between two parties. JWT can be enclosed in

      encrypted or signed tokens like JWS and JWE.


      The [JOSE IANA registry](https://www.iana.org/assignments/jose/jose.xhtml)

      provides algorithms information.


      RFC8725 describes common pitfalls in the JWx specifications and in

      their implementations, such as:

      - the ability to ignore algorithms, eg. `{"alg": "none"}`;

      - using insecure algorithms like `RSASSA-PKCS1-v1_5` eg. `{"alg":
      "RS256"}`.


      An API using JWT should explicit in the `description`

      that the implementation conforms to RFC8725.


      ```

      components:
        securitySchemes:
          JWTBearer:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: |-
              A bearer token in the format of a JWS and conformato
              to the specifications included in RFC8725.
      ```
    message: JWT usage should be detailed in `description` {{error}}.
    given:
      - $.[securitySchemes][?(@.bearerFormat=="jwt" || @.bearerFormat=="JWT")]
    then:
      - field: description
        function: truthy
      - field: description
        function: pattern
        functionOptions:
          match: .*RFC8725.*
    tags:
      - source:team-digitale
      - format:openapi
      - category:security
  team-digitale/securitySchemes-oauth-http:
    description: OAuth2 endpoints must use `https://`
    message: OAuth endpoints must use https://
    formats:
      - oas3
    severity: error
    recommended: true
    given:
      - $.[securitySchemes][?(@.type=="oauth2")][*].[?(@property.match(/url$/i))]
    then:
      - field: value
        function: pattern
        functionOptions:
          match: ^https://
    tags:
      - source:team-digitale
      - format:openapi
      - category:security
  team-digitale/securitySchemes-oauth-allowed-flows:
    description: >-
      The OAuth2 authorization framework defines various

      [grant types](https://tools.ietf.org/html/rfc6749#section-1.3),

      most notably the
      [AuthorizationCode](https://tools.ietf.org/html/rfc6749#section-1.3.1)

      and the [Client
      Credentials](https://tools.ietf.org/html/rfc6749#section-1.3.4).


      Some grant types are now considered insecure

      and MUST not be used, including `implicit` and `password`.

      The new [OAuth2.1](https://tools.ietf.org/html/draft-ietf-oauth-v2-1-01)

      still in draft, removes them and suggests to

      replace the `implicit` with `authorizationCode` + PKCE defined in RFC7636.
    message: 'Do not use oauth2 insecure flow: "{{property}}".'
    formats:
      - oas3
    severity: error
    recommended: true
    given:
      - $.[?(@.type=="oauth2")].flows
    then:
      - field: implicit
        function: falsy
      - field: password
        function: falsy
    tags:
      - source:team-digitale
      - format:openapi
      - category:security
  team-digitale/string-maxlength:
    description: |-
      String length should be limited to avoid an attacker
      to send very long strings to your service.

      You can do this in different ways:
      - specify a `maxLength`
      - constraint the possible values with an `enum`
      - use a constrained `format` like `date` or `date-time`.

      A constrained string using the `date` format.

      ```
      ConstrainedString:
        type: string
        format: date
      ```

      Another constrained string using `maxLength`.
      You can always add further constraints using a
      `pattern` or a `format`.

      ```
      ZipCode:
        type: string
        maxLength: 5
        pattern: '[0-9]{5}'
      ```

      For further security, you can always limit string length even
      in conjunction with `format` and `pattern`.
    message: Strings (non enum) must specify a maximum length. {{path}} {{error}}
    formats:
      - oas3
    severity: warn
    recommended: true
    given:
      - $.[?(@.type=="string" && !@.enum && @.format!="date" && @.format
        !="date-time" )]
    then:
      - field: maxLength
        function: defined
    tags:
      - source:team-digitale
      - format:openapi
      - category:general
  team-digitale/string-pattern-or-format-or-enum:
    description: |-
      String length should be limited to avoid an attacker
      to send very long strings to your service.

      You can do this in different ways:
      - specify a `maxLength`
      - constraint the possible values with an `enum`
      - use a constrained `format` like `date` or `date-time`.

      A constrained string using the `date` format.

      ```
      ConstrainedString:
        type: string
        format: date
      ```

      Another constrained string using `maxLength`.
      You can always add further constraints using a
      `pattern` or a `format`.

      ```
      ZipCode:
        type: string
        maxLength: 5
        pattern: '[0-9]{5}'
      ```

      For further security, you can always limit string length even
      in conjunction with `format` and `pattern`.
    message: Strings (non enum) must specify a pattern or a format. {{path}}
    formats:
      - oas3
    severity: hint
    recommended: true
    given:
      - $.[?(@.type=="string" && !@.enum && @.format!="date" && @.format
        !="date-time" )]
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          anyOf:
            - required:
                - pattern
            - required:
                - format
          additionalProperties: true
    tags:
      - source:team-digitale
      - format:openapi
      - category:general
  trimble/tas-openapi-v3-schema-properties-names-camel-case:
    description: Ensuring that schema property names are camel case.
    message: All schema property names MUST be camel case.
    severity: error
    given: $..properties.
    then:
      field: "@key"
      function: pattern
      functionOptions:
        match: ^[a-z][a-zA-Z0-9]*$
      errorMessage: All field names MUST be formatted as camel case.
    tags:
      - source:trimble
      - format:openapi
      - category:naming
  trimble/tdp-tag-pascal-case:
    severity: warn
    recommended: true
    message: Tag names cannot use Pascal Case. Please rename {{value}}.
    given:
      - $.tags[*].name
      - $.paths[*][*].tags[*]
    then:
      function: pattern
      functionOptions:
        notMatch: /[A-Z][a-z]+[A-Z][a-z]+$/g
    tags:
      - source:trimble
      - format:openapi
      - category:naming
    description: tdp-tag-pascal-case
  trimble/tdp-tag-camel-case:
    description: Detects a tag with camelCase (personalItem) text within it
    severity: warn
    recommended: true
    message: Tag names cannot use Camel Case. Please rename {{value}}.
    given:
      - $.tags[*].name
      - $.paths[*][*].tags[*]
    then:
      function: pattern
      functionOptions:
        notMatch: /^[a-z]+[A-Z][a-z]+$/g
    tags:
      - source:trimble
      - format:openapi
      - category:naming
  trimble/tdp-tag-no-versions:
    severity: warn
    recommended: true
    message: Tag names cannot have version information {{value}}. Consider
      versioning your API.
    given:
      - $.tags[*].name
      - $.paths[*][*].tags[*]
    then:
      function: pattern
      functionOptions:
        notMatch: /(V|v)\s?[0-9]+/g
    tags:
      - source:trimble
      - format:openapi
      - category:versioning
    description: tdp-tag-no-versions
  trimble/tdp-minimum-spec-version:
    description: The spec version should be 3 or greater.
    severity: warn
    formats:
      - oas2
    given:
      - $
    then:
      field: string
      function: truthy
    tags:
      - source:trimble
      - format:openapi
      - category:versioning
  trimble/tas-operation-delete-204-status-code:
    description: All DELETE methods MUST have a 204 response.
    severity: error
    recommended: true
    formats:
      - oas3
    given:
      - $.paths[*].delete.responses
    then:
      field: "204"
      function: truthy
    tags:
      - source:trimble
      - format:openapi
      - category:errors
  trimble/tas-operation-400-response-body:
    description: All 400 responses must include a response body.
    severity: error
    recommended: true
    formats:
      - oas3
    given:
      - $.paths.*.*.responses['400']
    then:
      field: content
      function: truthy
    tags:
      - source:trimble
      - format:openapi
      - category:structure
  sps-commerce/sps-no-http-basic:
    description: Consider a more secure alternative to HTTP Basic.
    message: HTTP Basic is an insecure way to pass credentials around, use an
      alternative.
    severity: error
    given: $.components.securitySchemes[*]
    then:
      field: scheme
      function: pattern
      functionOptions:
        notMatch: basic
    tags:
      - source:sps-commerce
      - format:openapi
      - category:security
  sps-commerce/sps-no-collection-paging-capability:
    description: Response bodies from collection endpoints SHOULD offer paging capability.
    severity: warn
    given: $.paths[?(!@property.match(/.*\/\{[^}]+\}.*$/))].get.responses['200'].content.application/json.schema.properties
    then:
      - field: paging
        function: truthy
      - field: paging
        function: pattern
        functionOptions:
          match: object
      - field: paging.type
        function: pattern
        functionOptions:
          match: object
    tags:
      - source:sps-commerce
      - format:openapi
      - category:general
  sps-commerce/sps-collection-missing-results-array:
    description: Response bodies must have a root element called results and is an
      array of objects.
    severity: error
    given: $.paths[?(!@property.match(/.*\/\{[^}]+\}$/))].get.responses['200'].content.application/json.schema.properties.results
    then:
      - field: type
        function: pattern
        functionOptions:
          match: array
      - field: items.type
        function: pattern
        functionOptions:
          match: object
    tags:
      - source:sps-commerce
      - format:openapi
      - category:general
  sps-commerce/sps-missing-pagination-query-parameters:
    description: Collection GET endpoints SHOULD support pagination using query
      parameters. Offset or cursor based pagination is required.
    severity: warn
    given: $.paths[?(!@property.match(/.*\/\{[^}]+\}\/*.*/))].get
    then:
      - field: parameters
        function: schema
        functionOptions:
          schema:
            type: array
            items:
              type: object
            contains:
              type: object
              properties:
                name:
                  const: limit
                in:
                  const: query
            allOf:
              - anyOf:
                  - contains:
                      type: object
                      properties:
                        name:
                          const: offset
                        in:
                          const: query
                  - contains:
                      type: object
                      properties:
                        name:
                          const: cursor
                        in:
                          const: query
    tags:
      - source:sps-commerce
      - format:openapi
      - category:pagination
  sps-commerce/sps-post-request-body-missing-paging-object:
    description: POST collection endpoints MUST have a request body schema that
      includes paging parameters.
    severity: error
    given: $.paths[?(!@property.match(/.*\/\{[^}]+\}$/))].post.requestBody.content.application/json.schema.properties.paging
    then:
      field: type
      function: pattern
      functionOptions:
        match: object
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-disallow-resource-identifier-filtering:
    description: Resource identifier filtering is not allowed as a query parameter.
      Use the resource identifier in the URL path.
    severity: warn
    given: $.paths..get.parameters.[?(@.in=='query' && @.name=='id')]
    then:
      field: name
      function: pattern
      functionOptions:
        notMatch: ^id$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-filtering-only-get-requests:
    description: Only GET-based endpoints SHOULD have have the query parameter 'filter'.
    severity: error
    given: $.paths.*[?(@property!='get')].parameters.[?(@.in=='query' &&
      @.name=='filter')].name
    then:
      function: falsy
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-hybird-filtering-exists-with-root-filter:
    description: Hybrid filtering MAY be offered on multiple attributes, but MUST
      never exist if a root "filter" query parameter is present.
    severity: error
    given: $.paths..get.parameters^
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          properties:
            parameters:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  in:
                    type: string
          allOf:
            - if:
                properties:
                  parameters:
                    type: array
                    contains:
                      type: object
                      properties:
                        name:
                          const: filter
              then:
                not:
                  properties:
                    parameters:
                      type: array
                      contains:
                        type: object
                        properties:
                          name:
                            type: string
                            pattern: \w+Filter
    tags:
      - source:sps-commerce
      - format:openapi
      - category:general
  sps-commerce/sps-sorting-parameters-only-get-requests:
    description: Non-GET endpoints MUST NOT have sorting query parameters. Parameter
      names such as sort, sorting, orderBy, etc.
    severity: error
    given: $.paths.*[?(@property!='get')].parameters.[?(@.in=='query')]
    then:
      field: name
      function: pattern
      functionOptions:
        notMatch: ^sort|sorting|sortBy|order|ordering|orderBy$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-unknown-error-format:
    description: Every error response SHOULD support RFC 7807.
    severity: error
    given: $.paths...responses[?(@property.match(/^(4|5)/))].content.*~
    then:
      function: enumeration
      functionOptions:
        values:
          - application/problem+xml
          - application/problem+json
    tags:
      - source:sps-commerce
      - format:openapi
      - category:errors
  sps-commerce/sps-no-keyword-conflicts:
    description: Names that may conflict with keywords in common programming
      languages SHOULD NOT be used.
    severity: warn
    given: $..properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^(abstract|for|new|switch|assert|default|goto|package|synchronized|boolean|do|if|private|this|break|double|implements|throw|byte|else|import|public|throws|case|enum|instanceof|return|transient|catch|extends|int|short|try|char|final|interface|static|void|class|finally|long|volatile|const|float|native|super|while)$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-camel-case-properties:
    description: Property names and acronyms MUST be in camelCase.
    severity: error
    formats:
      - oas3
    given: $..properties.*~
    then:
      function: pattern
      functionOptions:
        match: ^[a-z][a-z0-9]*(([A-Z]{2}|[A-Z])[a-z0-9]+)*$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-disallowed-prepositions:
    description: Property names SHOULD NOT include prepositions (e.g. "for",
      "during", "at", etc.)
    severity: warn
    formats:
      - oas3
    given: $..properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: (^(about|above|across|after|against|among|around|at|before|behind|below|beside|between|down|during|for|from|in|inside|into|near|of|off|on|out|over|through|to|toward|under|up|with|as|but|like|since|than|till|unlike|until|upon|within|without)([A-Z]|$)|.*(About|Above|Across|After|Against|Among|Around|At|Before|Behind|Below|Beside|Between|Down|During|For|From|In|Inside|Into|Near|Of|Off|On|Out|Over|Through|To|Toward|Under|Up|With|As|But|Like|Since|Than|Till|Unlike|Until|Upon|Within|Without)([A-Z]|$)).*
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-disallowed-boolean-prefixes:
    description: Boolean properties SHOULD NOT use is, has, or another prefix.
    severity: warn
    formats:
      - oas3
    given: $..properties[?(@ && @.type == 'boolean')]~
    then:
      function: pattern
      functionOptions:
        notMatch: ^(is|has|was|will|needs|uses|should|can)([A-Z]|$).*
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-ref-property-name:
    description: Property with the name 'ref' MUST use a format 'sps-ref'.
    severity: error
    formats:
      - oas3
    given: $..properties..[?((@property=== "ref" || @property === "Ref") && @.$ref
      == null && @.allOf == null && @.oneOf == null && @.type != null)]
    resolved: false
    then:
      - field: format
        function: truthy
      - field: format
        function: pattern
        functionOptions:
          match: ^sps-ref$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-ref-schema:
    description: Properties following 'sps-ref' format MUST use the standardized
      schema - maxLength (255), minLength(7), pattern (includes 'sps'), type
      (string).
    message: "{{property}} is not provided or not following required schema values."
    severity: error
    formats:
      - oas3
    given: $..[?(@property=== "format" && @ == "sps-ref")]^
    then:
      - function: schema
        functionOptions:
          schema:
            type: object
            required:
              - maxLength
              - minLength
              - type
              - pattern
            properties:
              maxLength:
                type: integer
                minimum: 255
                maximum: 255
              minLength:
                type: integer
                minimum: 7
                maximum: 7
              type:
                type: string
              pattern:
                type: string
      - field: pattern
        function: pattern
        functionOptions:
          match: sps
      - field: type
        function: pattern
        functionOptions:
          match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-id-type:
    description: id SHOULD use a data type of 'string'.
    severity: warn
    formats:
      - oas3
    given: $..[?(@property === "id")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-mandate-abbreviations-identifier:
    description: Use abbreviations instead of long form names, i.e. identifier SHOULD BE id.
    severity: warn
    formats:
      - oas3
    given: $..properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^identifier$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-mandate-abbreviations-organization:
    description: Use abbreviations instead of long form names, i.e. organization
      SHOULD BE org.
    severity: warn
    formats:
      - oas3
    given: $..properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: (^organization([A-Z]|$)|Organization([A-Z]|$))
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-ref-type:
    description: ref MUST use a data type of 'string'.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "ref")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-orgid-type:
    description: orgId MUST use a data type of 'string'.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "orgId")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-name-type:
    description: name MUST use a data type of 'string'.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "name")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-description-type:
    description: description MUST use a data type of 'string'.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "description")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-request-id-type:
    description: requestId MUST use a data type of 'string'.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "requestId")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-created-date-time-type:
    description: createdDateTime MUST use a data type of 'string' with the format
      'date-time'.
    severity: error
    formats:
      - oas3
    given: $..properties.createdDateTime
    then:
      - field: type
        function: pattern
        functionOptions:
          match: ^string$
      - field: format
        function: truthy
      - field: format
        function: pattern
        functionOptions:
          match: ^date-time$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-created-by-type:
    description: createdBy MUST use a data type of 'string'.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "createdBy")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-modified-date-time-type:
    description: modifiedDateTime MUST use a data type of 'string' with the format
      'date-time'.
    severity: error
    formats:
      - oas3
    given: $..properties.modifiedDateTime
    then:
      - field: type
        function: pattern
        functionOptions:
          match: ^string$
      - field: format
        function: truthy
      - field: format
        function: pattern
        functionOptions:
          match: ^date-time$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-modified-by-type:
    description: modifiedBy MUST use a data type of 'string'.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "modifiedBy")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-deleted-by-type:
    description: deletedBy MUST use a data type of 'string'.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "deletedBy")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-fingerprint-type:
    description: Fingerprint values MUST use a data type of `string`.
    severity: error
    formats:
      - oas3
    given: $..[?(@property === "fingerprint")].type
    then:
      function: pattern
      functionOptions:
        match: ^string$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-fingerprint-naming:
    description: Rather than property names refering to the implementation for
      'hash' or 'hashkey', you MUST use the property name 'fingerprint'.
    message: "{{property}} is not using property name fingerprint."
    severity: error
    formats:
      - oas3
    given: $.components.schemas..properties.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^hashkey|hashKey|hash$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:naming
  sps-commerce/sps-invalid-response-body:
    description: Response bodies must be an object type.
    severity: error
    given: $.paths[*][*].responses[*].content.application/json.schema.type
    then:
      function: pattern
      functionOptions:
        match: object
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-invalid-status-code:
    description: An API MUST return HTTP response codes in conformance with RFC-2616
      and common usage.
    severity: error
    given: $.paths...responses.*~
    then:
      function: enumeration
      functionOptions:
        values:
          - "200"
          - "201"
          - "202"
          - "204"
          - "400"
          - "401"
          - "403"
          - "404"
          - "405"
          - "406"
          - "409"
          - "412"
          - "415"
          - "428"
          - "429"
          - "500"
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-missing-500-response:
    description: Every endpoint SHOULD have a 500 response
    severity: warn
    given: $.paths[*][*]
    then:
      field: responses.500
      function: truthy
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-headers-hyphenated-pascal-case:
    description: All `HTTP` headers MUST use `Hyphenated-Pascal-Case` notation
    severity: error
    given: $..parameters[?(@.in == 'header')].name
    type: style
    then:
      function: pattern
      functionOptions:
        match: /^([A-Z][a-z0-9]-)*([A-Z][a-z0-9])+/
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-no-x-headers:
    description: Do not use headers with X-
    severity: warn
    message: "Headers cannot start with X-. More: https://tools.ietf.org/html/rfc6648"
    given: $..parameters.[?(@.in === 'header')].name
    then:
      function: pattern
      functionOptions:
        notMatch: ^(x|X)-
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-no-x-response-headers:
    description: Do not use headers with X-
    severity: warn
    message: "Headers cannot start with X-, so please find a new name for
      {{property}}. More: https://tools.ietf.org/html/rfc6648"
    given: $..headers.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^(x|X)-
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-invalid-location-header:
    description: Location header MUST NOT be present in non-201 responses
    severity: error
    given: $.paths[*][*].responses[?(@property !== '201')].headers
    then:
      field: Location
      function: falsy
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-authorization-missing:
    description: Security field MUST be present at the root of the spec with at
      least one item (ie. HTTPBearer, Token, APIKey, etc.)
    severity: error
    given: $
    then:
      field: security
      function: schema
      functionOptions:
        schema:
          type: array
          minItems: 1
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-default-content-language:
    description: Content-Language is optional but MUST default locale to en-US when
      none provided
    severity: error
    given: $.paths[*][*].responses[*].headers.Content-Language.schema.default
    then:
      function: pattern
      functionOptions:
        match: en-US
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-no-explicit-headers:
    description: Access-Control-*, Content-Type, and Accept Headers SHOULD NOT be
      specified explicitly in a spec as it an operational concern.
    severity: warn
    given: $.paths[*][*].responses[*].headers
    then:
      function: pattern
      functionOptions:
        notMatch: ^(Access-Control-.*|Content-Type|Accept)$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-invalid-custom-header-format:
    description: Custom headers MUST NOT be longer than 50 chars, and MUST only
      contain alphanumeric and dash chars, and MUST begin with Sps- not X-
    severity: error
    given: $.paths[*][*].responses[*].headers.*~
    then:
      function: pattern
      functionOptions:
        match: ^(Sps-[a-zA-Z0-9-]{1,50}|Accept|Access-Control.*|Authorization|Cache-Control|Content-Disposition|Content-Language|Content-Length|Content-Type|Date|ETag|Host|If-Match|If-None-Match|Location|Origin|User-Agent)$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-sensitive-data-in-headers:
    description: Headers MUST NOT contain sensitive data.
    severity: error
    given: $.paths[*][*].responses[*].headers.*~
    then:
      function: pattern
      functionOptions:
        notMatch: ^(SPS-Token|SPS-Password|SPS-Identity|Password)$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-no-resource-extensions:
    description: Request and Response media type formats MUST NOT be implied using
      extensions on resources (i.e. .json or .xml). Instead, use the standard
      resource path with the appropriate Content-Type header
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        notMatch: \.json|\.xml|\.yml|\.yaml
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-invalid-mime-type:
    description: MIME types MUST be standard (application/json,
      application/problem+json, application/problem+xml) or use custom format
      application/vnd.*
    severity: error
    given: $.paths[*][*].responses[*].content.*~
    then:
      function: pattern
      functionOptions:
        match: ^application/(json|problem\+json|problem\+xml|vnd\..*)$
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-invalid-http-method:
    description: Operations MUST use only the common HTTP methods as outlined in the
      standards guide, and must be in lower-case
    severity: error
    given: $.paths[*].*~
    then:
      field: method
      function: enumeration
      functionOptions:
        values:
          - get
          - post
          - put
          - patch
          - delete
          - head
          - options
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-request-get-invalid-body:
    description: A `GET` request MUST NOT accept a request body
    severity: error
    given: $.paths[*][get].requestBody
    then:
      function: undefined
    tags:
      - source:sps-commerce
      - format:openapi
      - category:structure
  sps-commerce/sps-response-get-missing-body:
    description: A `GET` operation must return a response body
    severity: error
