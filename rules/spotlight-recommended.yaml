description: Spotlight best-of-breed OpenAPI governance ruleset, compiled from
  public Spectral rulesets. Built-in functions only; select rules with tags
  (source:*, category:*, format:*).
documentationUrl: https://github.com/api-commons/spotlight-validator
extends:
  - - spotlight:oas
    - recommended
rules:
  adidas/adidas-paths-kebab-case:
    description: All YAML/JSON paths MUST follow kebab-case
    severity: warn
    recommended: true
    message: "{{property}} is not kebab-case: {{error}}"
    given: $.paths[*]~
    then:
      function: pattern
      functionOptions:
        match: ^/([a-z0-9]+(-[a-z0-9]+)*)?(/[a-z0-9]+(-[a-z0-9]+)*|/{.+})*$
    tags:
      - source:adidas
      - format:openapi
      - category:naming
  adidas/adidas-path-parameters-camelCase-alphanumeric:
    description: Path parameters MUST follow camelCase
    severity: warn
    recommended: true
    message: "{{property}} path parameter is not camelCase: {{error}}"
    given: $..parameters[?(@.in == 'path')].name
    then:
      function: pattern
      functionOptions:
        match: ^[a-z][a-zA-Z0-9]+$
    tags:
      - source:adidas
      - format:openapi
      - category:naming
  adidas/adidas-definitions-camelCase-alphanumeric:
    description: All YAML/JSON definitions MUST follow fields-camelCase and be ASCII
      alphanumeric characters or `_` or `$`.
    severity: error
    recommended: true
    message: "{{property}} MUST follow camelCase and be ASCII alphanumeric
      characters or `_` or `$`."
    given: $.definitions[*]~
    then:
      function: pattern
      functionOptions:
        match: /^[a-z$_]{1}[A-Z09$_]*/
    tags:
      - source:adidas
      - format:openapi
      - category:naming
  adidas/adidas-properties-camelCase-alphanumeric:
    description: All JSON Schema properties MUST follow fields-camelCase and be
      ASCII alphanumeric characters or `_` or `$`.
    severity: error
    recommended: true
    message: "{{property}} MUST follow camelCase and be ASCII alphanumeric
      characters or `_` or `$`."
    given: $.definitions..properties[*]~
    then:
      function: pattern
      functionOptions:
        match: /^[a-z$_]{1}[A-Z09$_]*/
    tags:
      - source:adidas
      - format:openapi
      - category:naming
  adidas/adidas-headers-hyphenated-pascal-case:
    description: All `HTTP` headers MUST use `Hyphenated-Pascal-Case` notation
    severity: error
    given: $..parameters[?(@.in == 'header')].name
    message: "'HTTP' headers MUST follow 'Hyphenated-Pascal-Case' notation"
    recommended: true
    type: style
    then:
      function: pattern
      functionOptions:
        match: /^([A-Z][a-z0-9]-)*([A-Z][a-z0-9])+/
    tags:
      - source:adidas
      - format:openapi
      - category:naming
  adidas/adidas-oas2-protocol-https-only:
    description: ALL requests MUST go through `https` protocol only
    formats:
      - oas2
    recommended: true
    severity: error
    type: style
    message: Schemes MUST be https and no other value is allowed.
    given: $
    then:
      field: schemes
      function: schema
      functionOptions:
        schema:
          type: array
          items:
            type: string
            enum:
              - https
          maxItems: 1
    tags:
      - source:adidas
      - format:openapi
      - category:security
  adidas/adidas-oas2-request-support-json:
    description: Every request SHOULD support `application/json` media type
    formats:
      - oas2
    severity: warn
    message: "{{description}}: {{error}}"
    recommended: true
    given: $..consumes
    then:
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: string
            enum:
              - application/json
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas2-example-exists-in-parameters:
    description: All models MUST have a valid example.
    severity: error
    recommended: true
    formats:
      - oas2
    message: "{{ property }} MUST have a valid example."
    given: $..parameters..[?(@.in == 'body' && (@.example || @.schema.$ref))]
    then:
      function: truthy
    tags:
      - source:adidas
      - format:openapi
      - category:documentation
  adidas/adidas-oas2-response-success-hal:
    description: All success responses MUST be of media type `application/hal+json`
    severity: error
    given: $.paths..responses[?( @property >= 200 && @property < 300 && @property !=
      204)]
    recommended: true
    type: style
    formats:
      - oas2
    message: "Response documents MUST follow application/hal+json: {{error}}"
    then:
      field: schema
      function: schema
      functionOptions:
        schema:
          $ref: ./supermodel/adidas/api/HAL.yaml
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas2-response-error-problem:
    description: All error responses MUST be of media type `application/problem+json`
    severity: error
    formats:
      - oas2
    given: $.paths..responses[?( @property >= 400 && @property < 600 )]
    recommended: true
    type: style
    message: "Error response document MUST follow application/problem+json: {{error}}"
    then:
      field: schema.example
      function: schema
      functionOptions:
        schema:
          $ref: ./supermodel/adidas/api/ProblemDetail.yaml
    tags:
      - source:adidas
      - format:openapi
      - category:errors
  adidas/adidas-oas3-request-support-json:
    description: Every request MUST support `application/json` media type
    formats:
      - oas3
    recommended: true
    severity: error
    message: "{{description}}: {{error}}"
    given: $.paths.[*].requestBody.content[?(@property.indexOf('json') === -1)]^
    then:
      function: falsy
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas3-protocol-https-only:
    description: ALL requests MUST go through `https` protocol only
    formats:
      - oas3
    recommended: true
    severity: error
    message: Servers MUST be https and no other protocol is allowed.
    given: $.servers..url
    then:
      function: pattern
      functionOptions:
        match: /^https:/
    tags:
      - source:adidas
      - format:openapi
      - category:security
  adidas/adidas-oas3-response-success-hal:
    description: "All success responses MUST be of media type `application/hal+json` "
    severity: error
    given: $.paths..responses[?( @property >= 201 && @property < 300 && @property !=
      204)].content[*]~
    recommended: true
    formats:
      - oas3
    message: "Response documents MUST be of application/hal+json media types: {{error}}"
    then:
      function: enumeration
      functionOptions:
        values:
          - application/hal+json
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas3-response-success-OK:
    description: All success responses MUST be of media type `application/hal+json`
      or `application/problem+json`
    severity: error
    given: $.paths..responses[?( @property == 200 )].content[*]~
    recommended: true
    formats:
      - oas3
    message: "Response documents MUST be of application/hal+json or
      application/problem+json media types: {{error}}"
    then:
      function: enumeration
      functionOptions:
        values:
          - application/hal+json
          - application/problem+json
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas3-response-success-hal-body:
    description: All success responses MUST follow `application/hal+json` schema
    severity: error
    given: $.paths..responses[?( @property == 200 && @property < 300 && @property !=
      204)].content[?(@property === "application/hal+json")]
    recommended: true
    type: style
    formats:
      - oas3
    message: "Response documents MUST follow application/hal+json schema: {{error}}"
    then:
      field: schema
      function: schema
      functionOptions:
        schema:
          $ref: ./supermodel/adidas/api/HAL.yaml
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas3-no-get-request-body:
    description: GET requests MUST NOT have a request body.
    severity: error
    recommended: true
    formats:
      - oas2
      - oas3
    given: $.paths[*].get.requestBody
    then:
      function: falsy
      message: "{{description}}: {{error}}"
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas3-not-post-to-get-info:
    description: POST requests SHOULD NOT be used for retrieving information. Use
      GET instead.
    severity: error
    recommended: true
    formats:
      - oas2
      - oas3
    given: $.paths[*].post
    then:
      field: summary
      function: pattern
      functionOptions:
        notMatch: (retrieve|fetch|get|read)
      message: "{{description}}: {{error}}"
    tags:
      - source:adidas
      - format:openapi
      - category:documentation
  adidas/adidas-oas3-put-with-request-body:
    description: PUT requests MUST have a request body.
    severity: error
    recommended: true
    formats:
      - oas2
      - oas3
    given: $.paths[*].put
    then:
      field: requestBody
      function: truthy
      message: "{{description}}: {{error}}"
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas3-delete-with-request-body:
    description: DELETE requests MUST NOT have a request body.
    severity: error
    recommended: true
    formats:
      - oas2
      - oas3
    given: $.paths[*].delete.requestBody
    then:
      function: falsy
      message: "{{description}}: {{error}}"
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas3-no-verbs-in-paths:
    description: API paths MUST be resource-focused and MUST NOT include verbs like
      'get', 'update', 'create', or 'delete'.
    severity: warn
    recommended: true
    formats:
      - oas2
      - oas3
    message: Path '{{path}}' includes a verb (e.g., 'get', 'update', 'create',
      'delete'). API paths SHOULD be resource-focused.
    given: $.paths[*]~
    then:
      function: pattern
      functionOptions:
        notMatch: /\b(get|update|create|delete|fetch|retrieve)\b/
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  adidas/adidas-oas3-real-like-examples:
    description: API design SHOULD include real-like examples for request and
      response definitions.
    severity: warn
    recommended: true
    formats:
      - oas2
      - oas3
    message: The {{property}} SHOULD include a real-like example. Add realistic
      examples to improve API usability.
    given: $..[?(@.example || @.examples)]
    then:
      field: example
      function: truthy
    tags:
      - source:adidas
      - format:openapi
      - category:documentation
  adidas/adidas-oas3-stable-semantic-version:
    description: The API contract MUST have a stable version and MUST follow
      semantic versioning (e.g., '1.0.0'). Words like 'SNAPSHOT' or 'RELEASE'
      are not allowed.
    severity: error
    recommended: true
    formats:
      - oas2
      - oas3
    message: "{{description}}: {{error}}"
    given: $.info.version
    then:
      function: pattern
      functionOptions:
        match: ^(?!.*\b(SNAPSHOT|RELEASE)\b)(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$
    tags:
      - source:adidas
      - format:openapi
      - category:versioning
  adidas/adidas-oas3-security-section-required:
    description: The API contract MUST include a 'security' section at the root level.
    severity: error
    recommended: true
    formats:
      - oas2
      - oas3
    message: "{{description}}: {{error}}"
    given: $
    then:
      field: security
      function: truthy
    tags:
      - source:adidas
      - format:openapi
      - category:security
  adidas/adidas-oas3-components-required:
    description: The API contract MUST include a 'components' section.
    severity: error
    recommended: true
    formats:
      - oas2
      - oas3
    message: "{{description}}: {{error}}"
    given: $
    then:
      field: components
      function: truthy
    tags:
      - source:adidas
      - format:openapi
      - category:general
  adidas/adidas-oas3-security-schemes-required:
    description: The API contract MUST include a 'securitySchemes' subsection under
      the 'components' section.
    severity: error
    recommended: true
    formats:
      - oas2
      - oas3
    message: "{{description}}: {{error}}"
    given: $.components
    then:
      field: securitySchemes
      function: truthy
    tags:
      - source:adidas
      - format:openapi
      - category:security
  adidas/adidas-oas3-x-leanixid-required:
    description: The API contract SHOULD include a custom field 'x-leanixid' in the
      'info' section.
    severity: warn
    recommended: true
    formats:
      - oas2
      - oas3
    message: "{{description}}: {{error}}"
    given: $.info
    then:
      field: x-leanixid
      function: truthy
    tags:
      - source:adidas
      - format:openapi
      - category:general
  adidas/adidas-oas3-x-leanixid-uuid:
    description: The API contract SHOULD include a custom field 'x-leanixid'
      containing a valid UUID.
    severity: warn
    recommended: true
    formats:
      - oas2
      - oas3
    message: "{{description}}: {{error}}"
    given: $.info.x-leanixid
    then:
      function: pattern
      functionOptions:
        match: ^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$
    tags:
      - source:adidas
      - format:openapi
      - category:general
  adidas/adidas-oas3-x-gateway-required:
    description: The API contract SHOULD include a custom field 'x-gateway' in the
      'info' section.
    severity: warn
    recommended: true
    formats:
      - oas2
      - oas3
    message: "{{description}}: {{error}}"
    given: $.info
    then:
      field: x-gateway
      function: truthy
    tags:
      - source:adidas
      - format:openapi
      - category:general
  adidas/adidas-oas3-x-gateway-required-enumeration:
    description: "The 'x-gateway' property, if present, MUST have a value in the
      enumeration: kong, nginx, aws, akamai, sap, other."
    severity: warn
    recommended: true
    formats:
      - oas2
      - oas3
    given: $
    then:
      field: x-gateway
      function: enumeration
      functionOptions:
        values:
          - kong
          - nginx
          - aws
          - akamai
          - sap
          - other
    tags:
      - source:adidas
      - format:openapi
      - category:general
  adidas/adidas-oas3-hypermedia-links-required:
    description: The API contract MAY include hypermedia links to represent the
      state of resources and be navigable.
    severity: hint
    recommended: true
    formats:
      - oas2
      - oas3
    message: "{{description}}: {{error}}"
    given: $.paths[*][*].responses[*]
    then:
      field: links
      function: truthy
    tags:
      - source:adidas
      - format:openapi
      - category:structure
  baloise/can-use-correct-uri-versioning:
    message: Path can contain correct URI versioning
    description: CAN use correct URI versioning [115a]
    documentationUrl: https://github.com/baloise-incubator/spectral-ruleset/blob/main/doc/rules/can-use-correct-URI-versioning.test.md
    severity: error
    given: $.paths.*~
    then:
      function: pattern
      functionOptions:
        match: ^((?!.*\/v\d+(\/.*)?\/v\d+)\/.*)$
    tags:
      - source:baloise
      - format:openapi
      - category:versioning
  baloise/must-use-camel-case-for-property-names:
    message: Property name has to be ASCII camelCase
    description: MUST property names must be ASCII camelCase [118a]
    documentationUrl: https://github.com/baloise-incubator/spectral-ruleset/blob/main/doc/rules/property-names-must-be-ascii-camel-case.md
    severity: error
    given: $.paths.*.*[responses,requestBody]..content..schema..properties.*~
    then:
      function: pattern
      functionOptions:
        match: ^[a-z]+((\d)|([A-Z0-9][a-z0-9]+))*([A-Z])?$
    tags:
      - source:baloise
      - format:openapi
      - category:naming
  baloise/must-use-additional-standard-http-status-codes:
    message: "{{property}} is not a standardized response code"
    description: MUST use standard HTTP status codes [150a]
    documentationUrl: https://github.com/baloise-incubator/spectral-ruleset/blob/main/doc/rules/must-use-additional-standard-http-status-codes.md
    severity: error
    given: $.paths.*.*.responses.*~
    then:
      function: enumeration
      functionOptions:
        values:
          - "100"
          - "101"
          - "200"
          - "201"
          - "202"
          - "203"
          - "204"
          - "205"
          - "206"
          - "207"
          - "300"
          - "301"
          - "302"
          - "303"
          - "304"
          - "305"
          - "307"
          - "400"
          - "401"
          - "402"
          - "403"
          - "404"
          - "405"
          - "406"
          - "407"
          - "408"
          - "409"
          - "410"
          - "411"
          - "412"
          - "413"
          - "414"
          - "415"
          - "416"
          - "417"
          - "422"
          - "423"
          - "426"
          - "428"
          - "429"
          - "431"
          - "500"
          - "501"
          - "502"
          - "503"
          - "504"
          - "505"
          - "511"
          - default
    tags:
      - source:baloise
      - format:openapi
      - category:errors
  baloise/must-use-additional-standard-http-status-codes-422:
    message: Prefer 400 over 422 as response code
    description: MUST use standard HTTP status codes [150a]
    documentationUrl: https://github.com/baloise-incubator/spectral-ruleset/blob/main/doc/rules/must-use-additional-standard-http-status-codes.md
    severity: warn
    given: $.paths.*.*.responses.422
    then:
      field: "422"
      function: defined
    tags:
      - source:baloise
      - format:openapi
      - category:errors
  baloise/must-provide-baloise-api-audience:
    message: Missing or wrong `info.x-audience`.
    description: MUST provide API audience [219]
    documentationUrl: https://github.com/baloise-incubator/spectral-ruleset/blob/main/doc/rules/property-names-must-be-ascii-camel-case.md
    severity: error
    given: $.info
    then:
      - field: x-audience
        function: truthy
      - field: x-audience
        function: pattern
        functionOptions:
          match: ^(team-internal|domain-internal|company-internal|external-partner|external-public)$
    tags:
      - source:baloise
      - format:openapi
      - category:general
  baloise/must-use-camel-case-for-query-parameters:
    message: Query parameter name has to be ASCII camelCase
    description: MUST query parameter names must be ASCII camelCase [130a]
    documentationUrl: https://github.com/baloise-incubator/spectral-ruleset/blob/main/doc/rules/query-parameter-names-must-be-ascii-camel-case.md
    severity: error
    given: $.paths.*.*.parameters[?(@ && @.in=='query')].name
    then:
      function: pattern
      functionOptions:
        match: ^[a-z]+((\d)|([A-Z0-9][a-z0-9]+))*([A-Z])?$
    tags:
      - source:baloise
      - format:openapi
      - category:naming
  digitalocean/ratelimit-headers:
    description: Response must include ratelimit-x headers
    message: "{{description}}; missing {{property}}"
    severity: error
    given: $..responses.*
    then:
      - field: headers.ratelimit-limit
        function: truthy
      - field: headers.ratelimit-remaining
        function: truthy
      - field: headers.ratelimit-reset
        function: truthy
    tags:
      - source:digitalocean
      - format:openapi
      - category:pagination
  digitalocean/params-must-include-examples:
    description: Parameters must include examples
    given: $..parameters.*
    severity: error
    message: "{{description}}; missing {{property}}"
    then:
      function: xor
      functionOptions:
        properties:
          - example
          - examples
    tags:
      - source:digitalocean
      - format:openapi
      - category:documentation
  digitalocean/endpoint-must-be-ref:
    description: Endpoint must be a $ref
    message: "{{description}}; {{property}} incorrect"
    severity: error
    resolved: false
    given: $.paths.*.*
    then:
      field: $ref
      function: truthy
    tags:
      - source:digitalocean
      - format:openapi
      - category:structure
  digitalocean/path-must-include-version:
    description: Path must include the version
    message: "{{description}}; {{property}} incorrect"
    severity: error
    resolved: false
    given: $.paths[?(@property!='/<upload_url>')]~
    then:
      function: pattern
      functionOptions:
        match: ^(/v[12]/.*|/api/v[12]/.*)$
    tags:
      - source:digitalocean
      - format:openapi
      - category:versioning
  digitalocean/endpoint-ref-must-be-file:
    description: Endpoint must a $ref to a file in resources/
    message: "{{description}}; {{value}} incorrect"
    severity: error
    resolved: false
    given: $.paths.*.$ref
    then:
      function: pattern
      functionOptions:
        match: ^resources/.*yml$
    tags:
      - source:digitalocean
      - format:openapi
      - category:structure
  digitalocean/common-responses-unauthorized:
    description: Responses should contain common response - 401 (unauthorized)
    message: "{{description}}. Missing {{property}}"
    severity: error
    given: $.paths..responses
    then:
      field: "401"
      function: truthy
    tags:
      - source:digitalocean
      - format:openapi
      - category:security
  digitalocean/common-responses-not-found:
    description: Responses should contain common response - 404 (not found)
    message: "{{description}}. Missing {{property}}"
    severity: error
    given: $.paths[?(@property.match(/.*\/{.*}.*/))]..responses
    then:
      field: "404"
      function: truthy
    tags:
      - source:digitalocean
      - format:openapi
      - category:structure
  digitalocean/common-responses-too-many-requests:
    description: Responses should contain common response - 429 (too many requests)
    message: "{{description}}. Missing {{property}}"
    severity: error
    given: $.paths..responses
    then:
      field: "429"
      function: truthy
    tags:
      - source:digitalocean
      - format:openapi
      - category:structure
  digitalocean/common-responses-server-error:
    description: Responses should contain common response - 500 (server error)
    message: "{{description}}. Missing {{property}}"
    severity: error
    given: $.paths..responses
    then:
      field: "500"
      function: truthy
    tags:
      - source:digitalocean
      - format:openapi
      - category:errors
  digitalocean/oas3-operation-security-defined:
    description: Check operation security is defined
    severity: error
    given: $.paths.*.*
    then:
      field: security
      function: truthy
    tags:
      - source:digitalocean
      - format:openapi
      - category:security
  digitalocean/oas3-operation-security-scopes-defined:
    description: Check operation security uses a defined security scheme
    severity: error
    given: $.paths[*][*]..security.*
    then:
      function: schema
      functionOptions:
        schema:
          anyOf:
            - required:
                - bearer_auth
            - required:
                - inference_bearer_auth
    tags:
      - source:digitalocean
      - format:openapi
      - category:security
  microcks/microcks-info-extension-valid:
    description: x-microcks extension must be valid
    message: x-microcks extension must be valid
    formats:
