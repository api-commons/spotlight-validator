# json-schema default ruleset — basic "property should be present" rules (one truthy
# rule per known property). A starting point; generated by tools/compile-property-rules.mjs.
rules:
  json-schema-schema:
    description: The `$schema` property should be present.
    message: $schema should be present
    severity: warn
    given: $
    then:
      field: $schema
      function: truthy
    tags:
      - format:jsonschema
      - category:structure
  json-schema-id:
    description: The `$id` property should be present.
    message: $id should be present
    severity: info
    given: $
    then:
      field: $id
      function: truthy
    tags:
      - format:jsonschema
      - category:structure
  json-schema-title:
    description: The `title` property should be present.
    message: title should be present
    severity: info
    given: $
    then:
      field: title
      function: truthy
    tags:
      - format:jsonschema
      - category:documentation
  json-schema-description:
    description: The `description` property should be present.
    message: description should be present
    severity: info
    given: $
    then:
      field: description
      function: truthy
    tags:
      - format:jsonschema
      - category:documentation
  json-schema-type:
    description: The `type` property should be present.
    message: type should be present
    severity: warn
    given: $
    then:
      field: type
      function: truthy
    tags:
      - format:jsonschema
      - category:structure
  json-schema-properties:
    description: The `properties` property should be present.
    message: properties should be present
    severity: info
    given: $
    then:
      field: properties
      function: truthy
    tags:
      - format:jsonschema
      - category:structure
  json-schema-required:
    description: The `required` property should be present.
    message: required should be present
    severity: info
    given: $
    then:
      field: required
      function: truthy
    tags:
      - format:jsonschema
      - category:structure
  json-schema-property-type:
    description: The `type` property of each property should be present.
    message: type should be present
    severity: info
    given: $.properties[*]
    then:
      field: type
      function: truthy
    tags:
      - format:jsonschema
      - category:structure
  json-schema-property-description:
    description: The `description` property of each property should be present.
    message: description should be present
    severity: info
    given: $.properties[*]
    then:
      field: description
      function: truthy
    tags:
      - format:jsonschema
      - category:documentation
