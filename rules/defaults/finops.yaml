# finops default ruleset — basic "property should be present" rules (one truthy
# rule per known property). A starting point; generated by tools/compile-property-rules.mjs.
rules:
  finops-name:
    description: The `name` property should be present.
    message: name should be present
    severity: error
    given: $
    then:
      field: name
      function: truthy
    tags:
      - format:finops
      - category:documentation
  finops-description:
    description: The `description` property should be present.
    message: description should be present
    severity: info
    given: $
    then:
      field: description
      function: truthy
    tags:
      - format:finops
      - category:documentation
  finops-currency:
    description: The `currency` property should be present.
    message: currency should be present
    severity: warn
    given: $
    then:
      field: currency
      function: truthy
    tags:
      - format:finops
      - category:structure
  finops-budget:
    description: The `budget` property should be present.
    message: budget should be present
    severity: warn
    given: $
    then:
      field: budget
      function: truthy
    tags:
      - format:finops
      - category:structure
  finops-costs:
    description: The `costs` property should be present.
    message: costs should be present
    severity: info
    given: $
    then:
      field: costs
      function: truthy
    tags:
      - format:finops
      - category:structure
  finops-cost-service:
    description: The `service` property of each cost should be present.
    message: service should be present
    severity: warn
    given: $.costs[*]
    then:
      field: service
      function: truthy
    tags:
      - format:finops
      - category:structure
  finops-cost-monthly:
    description: The `monthly` property of each cost should be present.
    message: monthly should be present
    severity: info
    given: $.costs[*]
    then:
      field: monthly
      function: truthy
    tags:
      - format:finops
      - category:structure
