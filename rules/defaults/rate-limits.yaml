# Rate Limits — starter governance for rate-limit documents.
rules:
  rate-limits-defined:
    description: A rate-limits document MUST define one or more limits.
    message: Rate-limits document must define limits
    severity: error
    given: $
    then: { field: limits, function: truthy }
    tags: ["format:rate-limits", "category:structure"]
  rate-limit-window:
    description: Each limit should declare a time window.
    message: Each limit should declare a window
    severity: warn
    given: $.limits[*]
    then: { field: window, function: truthy }
    tags: ["format:rate-limits", "category:structure"]
  rate-limit-max:
    description: Each limit should declare a maximum number of requests.
    message: Each limit should declare a max
    severity: warn
    given: $.limits[*]
    then: { field: max, function: truthy }
    tags: ["format:rate-limits", "category:structure"]
