# rate-limits default ruleset — basic "property should be present" rules (one truthy
# rule per known property). A starting point; generated by tools/compile-property-rules.mjs.
rules:
  rate-limits-name:
    description: The `name` property should be present.
    message: name should be present
    severity: error
    given: $
    then:
      field: name
      function: truthy
    tags:
      - format:rate-limits
      - category:documentation
  rate-limits-description:
    description: The `description` property should be present.
    message: description should be present
    severity: info
    given: $
    then:
      field: description
      function: truthy
    tags:
      - format:rate-limits
      - category:documentation
  rate-limits-limits:
    description: The `limits` property should be present.
    message: limits should be present
    severity: error
    given: $
    then:
      field: limits
      function: truthy
    tags:
      - format:rate-limits
      - category:structure
  rate-limits-limit-name:
    description: The `name` property of each limit should be present.
    message: name should be present
    severity: warn
    given: $.limits[*]
    then:
      field: name
      function: truthy
    tags:
      - format:rate-limits
      - category:documentation
  rate-limits-limit-window:
    description: The `window` property of each limit should be present.
    message: window should be present
    severity: warn
    given: $.limits[*]
    then:
      field: window
      function: truthy
    tags:
      - format:rate-limits
      - category:structure
  rate-limits-limit-max:
    description: The `max` property of each limit should be present.
    message: max should be present
    severity: warn
    given: $.limits[*]
    then:
      field: max
      function: truthy
    tags:
      - format:rate-limits
      - category:structure
  rate-limits-limit-scope:
    description: The `scope` property of each limit should be present.
    message: scope should be present
    severity: info
    given: $.limits[*]
    then:
      field: scope
      function: truthy
    tags:
      - format:rate-limits
      - category:structure
