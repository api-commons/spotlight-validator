# json-ld default ruleset — basic "property should be present" rules (one truthy
# rule per known property). A starting point; generated by tools/compile-property-rules.mjs.
rules:
  require-context:
    description: The `@context` property should be present.
    message: "@context should be present"
    severity: error
    given: $
    then:
      field: "@context"
      function: truthy
    tags:
      - format:json-ld
      - spec:document
      - experience:data-modeling
      - experience:discoverability
  require-type:
    description: The `@type` property should be present.
    message: "@type should be present"
    severity: warn
    given: $
    then:
      field: "@type"
      function: truthy
    tags:
      - format:json-ld
      - spec:document
      - experience:data-modeling
      - experience:discoverability
  require-id:
    description: The `@id` property should be present.
    message: "@id should be present"
    severity: info
    given: $
    then:
      field: "@id"
      function: truthy
    tags:
      - format:json-ld
      - spec:document
      - experience:data-modeling
      - experience:discoverability
