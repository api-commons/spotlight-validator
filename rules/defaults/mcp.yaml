# mcp default ruleset — basic "property should be present" rules (one truthy
# rule per known property). A starting point; generated by tools/compile-property-rules.mjs.
rules:
  mcp-name:
    description: The `name` property should be present.
    message: name should be present
    severity: error
    given: $
    then:
      field: name
      function: truthy
    tags:
      - format:mcp
      - category:documentation
  mcp-version:
    description: The `version` property should be present.
    message: version should be present
    severity: warn
    given: $
    then:
      field: version
      function: truthy
    tags:
      - format:mcp
      - category:versioning
  mcp-description:
    description: The `description` property should be present.
    message: description should be present
    severity: warn
    given: $
    then:
      field: description
      function: truthy
    tags:
      - format:mcp
      - category:documentation
  mcp-protocolversion:
    description: The `protocolVersion` property should be present.
    message: protocolVersion should be present
    severity: info
    given: $
    then:
      field: protocolVersion
      function: truthy
    tags:
      - format:mcp
      - category:versioning
  mcp-capabilities:
    description: The `capabilities` property should be present.
    message: capabilities should be present
    severity: warn
    given: $
    then:
      field: capabilities
      function: truthy
    tags:
      - format:mcp
      - category:structure
  mcp-instructions:
    description: The `instructions` property should be present.
    message: instructions should be present
    severity: info
    given: $
    then:
      field: instructions
      function: truthy
    tags:
      - format:mcp
      - category:structure
  mcp-capability-tools:
    description: The `tools` property of each capability should be present.
    message: tools should be present
    severity: info
    given: $.capabilities
    then:
      field: tools
      function: truthy
    tags:
      - format:mcp
      - category:structure
  mcp-capability-resources:
    description: The `resources` property of each capability should be present.
    message: resources should be present
    severity: info
    given: $.capabilities
    then:
      field: resources
      function: truthy
    tags:
      - format:mcp
      - category:structure
  mcp-capability-prompts:
    description: The `prompts` property of each capability should be present.
    message: prompts should be present
    severity: info
    given: $.capabilities
    then:
      field: prompts
      function: truthy
    tags:
      - format:mcp
      - category:structure
