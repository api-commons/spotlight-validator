# plans default ruleset — basic "property should be present" rules (one truthy
# rule per known property). A starting point; generated by tools/compile-property-rules.mjs.
rules:
  require-name:
    description: The `name` property should be present.
    message: name should be present
    severity: error
    given: $
    then:
      field: name
      function: truthy
    tags:
      - format:plans
      - spec:document
      - experience:data-modeling
      - experience:governance
  require-description:
    description: The `description` property should be present.
    message: description should be present
    severity: info
    given: $
    then:
      field: description
      function: truthy
    tags:
      - format:plans
      - spec:document
      - experience:documentation
      - experience:governance
  require-currency:
    description: The `currency` property should be present.
    message: currency should be present
    severity: info
    given: $
    then:
      field: currency
      function: truthy
    tags:
      - format:plans
      - spec:document
      - experience:governance
      - experience:usability
  require-plans:
    description: The `plans` property should be present.
    message: plans should be present
    severity: error
    given: $
    then:
      field: plans
      function: truthy
    tags:
      - format:plans
      - spec:document
      - experience:data-modeling
      - experience:governance
  plan-require-name:
    description: The `name` property of each plan should be present.
    message: name should be present
    severity: error
    given: $.plans[*]
    then:
      field: name
      function: truthy
    tags:
      - format:plans
      - spec:plans
      - experience:data-modeling
      - experience:governance
  plan-require-description:
    description: The `description` property of each plan should be present.
    message: description should be present
    severity: info
    given: $.plans[*]
    then:
      field: description
      function: truthy
    tags:
      - format:plans
      - spec:plans
      - experience:documentation
      - experience:usability
  plan-require-price:
    description: The `price` property of each plan should be present.
    message: price should be present
    severity: warn
    given: $.plans[*]
    then:
      field: price
      function: truthy
    tags:
      - format:plans
      - spec:plans
      - experience:governance
      - experience:usability
  plan-require-features:
    description: The `features` property of each plan should be present.
    message: features should be present
    severity: info
    given: $.plans[*]
    then:
      field: features
      function: truthy
    tags:
      - format:plans
      - spec:plans
      - experience:usability
      - experience:documentation
  plan-require-limits:
    description: The `limits` property of each plan should be present.
    message: limits should be present
    severity: info
    given: $.plans[*]
    then:
      field: limits
      function: truthy
    tags:
      - format:plans
      - spec:plans
      - experience:governance
      - experience:reliability
